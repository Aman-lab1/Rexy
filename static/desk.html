<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#000000"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Rexy</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --face:    #ffffff;
      --eye-w:   90px;
      --eye-h:   110px;
      --eye-gap: 80px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      touch-action: none;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      color: #fff;
    }

    /* ════════════════════════════════
       LOGIN SCREEN
    ════════════════════════════════ */
    #login-screen {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 600ms ease, transform 600ms cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #login-screen.hide { opacity: 0; pointer-events: none; transform: scale(0.96); }

    .login-face { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 36px; animation: breathe 4s ease-in-out infinite; }
    .login-eyes { display: flex; gap: 22px; }
    .login-eye  { width: 28px; height: 34px; background: #fff; border-radius: 12px; }
    .login-mouth{ width: 20px; height: 5px; background: #fff; border-radius: 5px; }

    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: #444; margin-bottom: 36px; }

    .login-form { display: flex; flex-direction: column; gap: 12px; width: 300px; }
    .login-form input {
      background: #111; border: 1px solid #222; border-radius: 14px;
      padding: 14px 18px; font-size: 15px; color: #fff; outline: none;
      transition: border-color 200ms;
      -webkit-appearance: none; appearance: none;
    }
    .login-form input:focus { border-color: #444; }
    .login-form input::placeholder { color: #333; }

    .login-btn {
      background: #fff; color: #000; border: none; border-radius: 14px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
      transition: transform 100ms;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; appearance: none;
    }
    .login-btn:active { transform: scale(0.97); }
    #login-error { font-size: 12px; color: #ff4444; text-align: center; min-height: 18px; margin-top: 4px; }

    /* ════════════════════════════════
       MAIN SCREEN
    ════════════════════════════════ */
    #main-screen { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 800ms ease; }
    #main-screen.show { opacity: 1; pointer-events: all; }

    #scene {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Face ── */
    #face {
      display: flex; flex-direction: column; align-items: center; gap: 36px;
      will-change: transform;
    }

    #face.idle-anim { animation: breathe 4s ease-in-out infinite; }
    #face.doze-anim { animation: doze-sway 7s ease-in-out infinite; }
    #face.look-up {
      animation: none !important;
      transform: translateY(-18px) !important;
      transition: transform 500ms cubic-bezier(0.34, 1.3, 0.64, 1) !important;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);      }
      50%       { transform: scale(1.018); }
    }
    @keyframes doze-sway {
      0%, 100% { transform: scale(1)     translateY(0);    }
      30%       { transform: scale(1.006) translateY(-2px); }
      70%       { transform: scale(0.996) translateY(2px);  }
    }

    /* ── Eyes wrapper ── */
    #eyes-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Normal eyes row */
    #eyes {
      display: flex;
      align-items: center;
      gap: var(--eye-gap);
      transition: opacity 600ms ease;
    }

    /* ── Eye shell — each eye uses overflow+lid ── */
    .eye-shell {
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      flex-shrink: 0;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity       200ms ease;
      will-change: transform, height, border-radius;
      transform-origin: center center;
    }

    .eye-fill {
      width: 100%; height: 100%;
      background: #ffffff;
      border-radius: inherit;
    }

    /* Eyelid — slides down from top for dozing */
    .eye-lid {
      position: absolute;
      top: 0; left: -1px; right: -1px;
      height: 0;
      background: #000000;
      border-radius: 0 0 6px 6px;
      transition: height 800ms cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }

    /* Blink */
    .eye-shell.blink      { transform: scaleY(0.05) !important; transition: transform 80ms ease-in !important; }
    .eye-shell.blink-open { transform: scaleY(1)    !important; transition: transform 100ms ease-out !important; }
    .eye-shell.glance-left  { transform: translateX(-12px); }
    .eye-shell.glance-right { transform: translateX(12px);  }
    .eye-shell.look-up      { transform: translateY(-10px) !important; }

    /* ── EYE EMOTIONS ── */
    body[data-emotion="idle"]      .eye-shell { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="listening"] .eye-shell { width: 80px; height: 130px; border-radius: 50px; }
    body[data-emotion="happy"]     .eye-shell { width: 100px; height: 72px; border-radius: 80px 80px 8px 8px; }
    body[data-emotion="sad"]       .eye-shell { width: 78px; height: 118px; border-radius: 44px 44px 28px 28px / 60px 60px 30px 30px; }
    body[data-emotion="sad"]     #eye-r { transform: rotate(4deg); }
    body[data-emotion="sad"]     #eye-l { transform: rotate(-4deg); }
    body[data-emotion="thinking"] #eye-l { width: var(--eye-w); height: 44px; border-radius: 28px; }
    body[data-emotion="thinking"] #eye-r { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="surprised"] .eye-shell { width: 100px; height: 148px; border-radius: 60px; }

    /* Dozing — keep idle size, lids slide down */
    body[data-emotion="dozing"] .eye-shell { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="dozing"] #eye-l .eye-lid { height: 88px;  }
    body[data-emotion="dozing"] #eye-r .eye-lid { height: 96px;  }
    body:not([data-emotion="dozing"]) .eye-lid  { height: 0 !important; }

    /* ── ZZZ ── */
    #zzz-wrap {
      position: absolute;
      top: -20px; right: -54px;
      opacity: 0;
      transition: opacity 1000ms ease;
      pointer-events: none;
      z-index: 10;
    }
    body[data-emotion="dozing"] #zzz-wrap { opacity: 1; }

    .z {
      position: absolute;
      color: #ffffff; font-weight: 200;
      opacity: 0;
      animation: floatZ 3.4s ease-in-out infinite;
      pointer-events: none;
    }
    .z1 { font-size: 12px; animation-delay: 0s;    top: 0px;   left: 0px;  }
    .z2 { font-size: 17px; animation-delay: 1.1s;  top: -18px; left: 16px; }
    .z3 { font-size: 10px; animation-delay: 2.2s;  top: -32px; left: 34px; }

    @keyframes floatZ {
      0%   { opacity: 0;    transform: translateY(0px)   scale(0.7); }
      15%  { opacity: 0.55; transform: translateY(-6px)  scale(1);   }
      75%  { opacity: 0.15; transform: translateY(-28px) scale(0.85);}
      100% { opacity: 0;    transform: translateY(-44px) scale(0.6); }
    }

    /* ── MOUTH — base states ── */
    #mouth {
      width: 64px; height: 14px;
      background: var(--face);
      border-radius: 12px;
      align-self: center;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity       400ms ease;
    }

    body[data-emotion="idle"]      #mouth { width: 64px;  height: 14px; border-radius: 12px; transform: none; opacity: 1; }
    body[data-emotion="happy"]     #mouth { width: 96px;  height: 20px; border-radius: 0 0 60px 60px / 0 0 28px 28px; opacity: 1; }
    body[data-emotion="sad"]       #mouth { width: 80px;  height: 20px; border-radius: 60px 60px 0 0 / 28px 28px 0 0; opacity: 1; }
    body[data-emotion="thinking"]  #mouth { width: 20px;  height: 20px; border-radius: 50%; transform: translateX(12px); opacity: 1; }
    body[data-emotion="listening"] #mouth { width: 40px;  height: 22px; border-radius: 50%; opacity: 1; }
    body[data-emotion="surprised"] #mouth { width: 52px;  height: 52px; border-radius: 50%; opacity: 1; }
    body[data-emotion="dozing"]    #mouth { width: 22px;  height: 14px; border-radius: 50%; opacity: 0.45; }

    /* ── SPEAKING OVERLAY ── */
    body[data-speaking="true"] #mouth {
      width: 56px !important; height: 28px !important;
      border-radius: 50% !important; transform: none !important;
      animation: speak-pulse 0.4s ease-in-out infinite alternate !important;
      transition: none !important;
    }
    @keyframes speak-pulse {
      from { height: 18px; }
      to   { height: 40px; }
    }

    /* ── TIME display ── */
    #time-display {
      position: fixed; bottom: 28px; right: 28px;
      font-size: 15px; font-weight: 300; letter-spacing: 0.14em;
      color: #333; opacity: 0; transition: opacity 1200ms ease;
      pointer-events: none; z-index: 100;
      font-variant-numeric: tabular-nums;
    }
    #time-display.visible { opacity: 1; }
    .digit { display: inline-block; transition: opacity 300ms ease; }
    .digit.changing { opacity: 0; }

    /* ── Mic ring ── */
    #mic-ring {
      position: fixed; inset: 0;
      border: 2px solid rgba(255,255,255,0);
      pointer-events: none; z-index: 10;
      transition: border-color 400ms ease;
    }
    #mic-ring.active {
      border-color: rgba(255,255,255,0.08);
      animation: ring-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { border-color: rgba(255,255,255,0.05); }
      50%       { border-color: rgba(255,255,255,0.14); }
    }

    /* ── Status ── */
    #status {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: #2a2a2a; letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 300ms; pointer-events: none; white-space: nowrap; z-index: 20;
    }
    #status.visible { color: #3a3a3a; }

    /* ── Transcript ── */
    #transcript-bubble {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #222; border-radius: 18px;
      padding: 10px 18px; font-size: 13px; color: #888; max-width: 280px;
      text-align: center; opacity: 0; transition: opacity 300ms;
      pointer-events: none; z-index: 20; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    #transcript-bubble.show { opacity: 1; }

    /* ════════════════════════════════
       NOTIFICATION ISLAND
    ════════════════════════════════ */
    #island-wrap {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
    }
    #island {
      background: #ffffff; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      width: 10px; height: 10px; opacity: 0;
      transition: width 280ms cubic-bezier(0.34,1.3,0.64,1), height 280ms cubic-bezier(0.34,1.3,0.64,1), opacity 180ms ease;
      will-change: width, height, opacity;
    }
    #island.dot      { width: 10px;  height: 10px;  opacity: 1; }
    #island.expanded { width: 260px; height: 44px;  opacity: 1; }
    #island.gone     { width: 10px;  height: 10px;  opacity: 0; }
    #island-content {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 0 18px; width: 100%;
      opacity: 0; transform: scale(0.88);
      transition: opacity 180ms ease 100ms, transform 240ms cubic-bezier(0.34,1.56,0.64,1) 100ms;
      pointer-events: none;
    }
    #island.expanded #island-content { opacity: 1; transform: scale(1); }
    #island-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
    #island-text { font-size: 13.5px; font-weight: 600; letter-spacing: -0.015em; color: #000; white-space: nowrap; }

    /* ── Vignette ── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, #000 100%);
      pointer-events: none; z-index: 50;
    }
  </style>
</head>

<body data-emotion="idle" data-speaking="false">

<!-- LOGIN -->

<!-- MAIN -->

  <!-- Time display -->

    <span class="digit" id="d-h1"></span><span class="digit" id="d-h2"></span><span style="opacity:0.5">:</span><span class="digit" id="d-m1"></span><span class="digit" id="d-m2"></span>
  </div>

  <div id="island-wrap">

            <div class="eye-lid"></div>
          </div>

        <div id="zzz-wrap">
          <span class="z z1">z</span>
          <span class="z z2">z</span>

    </div>

  <div id="status">tap to speak</div>

<script>
/* ═══════════════════════════════════════════════════════
   REXY DESK BUDDY — Full build
   Firebase | WebSocket | Voice | TTS | Passive Mode
═══════════════════════════════════════════════════════ */

const FIREBASE_CONFIG = {
  apiKey:     "AIzaSyBJfildiIOb3PeUNDdPaiic2ZoBl_0qg5E",
  authDomain: "rexyassistant.firebaseapp.com",
  projectId:  "rexyassistant"
};
const RAILWAY_WS = "wss://web-production-1c2c75.up.railway.app/ws";

firebase.initializeApp(FIREBASE_CONFIG);
const fbAuth = firebase.auth();

const eyeL         = document.getElementById('eye-l');
const eyeR         = document.getElementById('eye-r');
const face         = document.getElementById('face');
const statusEl     = document.getElementById('status');
const transcriptEl = document.getElementById('transcript-bubble');
const micRing      = document.getElementById('mic-ring');

/* ════════════════════════════
   1. EMOTION ENGINE
════════════════════════════ */
const EmotionEngine = (() => {
  let current     = 'idle';
  let returnTimer = null;

  function set(emotion, duration = null) {
    current = emotion;
    document.body.setAttribute('data-emotion', emotion);
    if (returnTimer) clearTimeout(returnTimer);
    if (duration) returnTimer = setTimeout(() => set('idle'), duration);
  }

  function setSpeaking(active) {
    document.body.setAttribute('data-speaking', active ? 'true' : 'false');
  }

  function get() { return current; }
  return { set, get, setSpeaking };
})();

/* ════════════════════════════
   2. BLINK ENGINE
════════════════════════════ */
const BlinkEngine = (() => {
  function blink() {
    const e = EmotionEngine.get();
    if (['sad','surprised','dozing'].includes(e)) { schedule(); return; }
    if (document.body.getAttribute('data-speaking') === 'true') { schedule(); return; }

    eyeL.classList.add('blink'); eyeR.classList.add('blink');
    setTimeout(() => {
      eyeL.classList.remove('blink'); eyeR.classList.remove('blink');
      eyeL.classList.add('blink-open'); eyeR.classList.add('blink-open');
      setTimeout(() => {
        eyeL.classList.remove('blink-open'); eyeR.classList.remove('blink-open');
        schedule();
      }, 120);
    }, 100);
  }

  // Slow doze blink — lids close fully then reopen to doze position
  function dozeBlink() {
    if (EmotionEngine.get() !== 'dozing') return;
    const lL = eyeL.querySelector('.eye-lid');
    const lR = eyeR.querySelector('.eye-lid');
    lL.style.transition = 'height 200ms ease';
    lR.style.transition = 'height 200ms ease';
    lL.style.height = '110px';
    lR.style.height = '110px';
    setTimeout(() => {
      lL.style.transition = 'height 300ms ease';
      lR.style.transition = 'height 300ms ease';
      lL.style.height = '88px';
      lR.style.height = '96px';
      setTimeout(() => {
        lL.style.transition = '';
        lR.style.transition = '';
        if (EmotionEngine.get() === 'dozing')
          setTimeout(dozeBlink, 6000 + Math.random() * 6000);
      }, 350);
    }, 280);
  }

  function schedule() { setTimeout(blink, 4000 + Math.random() * 5000); }
  function start()    { schedule(); }
  return { start, dozeBlink };
})();

/* ════════════════════════════
   3. IDLE ENGINE
════════════════════════════ */
const IdleEngine = (() => {
  function glance() {
    if (EmotionEngine.get() !== 'idle') { scheduleGlance(); return; }
    const dir = Math.random() < 0.5 ? 'glance-left' : 'glance-right';
    eyeL.classList.add(dir); eyeR.classList.add(dir);
    setTimeout(() => {
      eyeL.classList.remove(dir); eyeR.classList.remove(dir);
      scheduleGlance();
    }, 700 + Math.random() * 700);
  }
  function scheduleGlance() { setTimeout(glance, 5000 + Math.random() * 8000); }

  function drift() {
    if (EmotionEngine.get() !== 'idle') { face.style.transform = ''; scheduleDrift(); return; }
    face.style.transition = 'transform 3s ease-in-out';
    face.style.transform  = `translate(${(Math.random()-0.5)*6}px,${(Math.random()-0.5)*4}px)`;
    scheduleDrift();
  }
  function scheduleDrift() { setTimeout(drift, 3000 + Math.random() * 4000); }

  function start() { scheduleGlance(); scheduleDrift(); }
  return { start };
})();

/* ════════════════════════════
   4. ISLAND ENGINE
════════════════════════════ */
const IslandEngine = (() => {
  const island = document.getElementById('island');
  const iconEl = document.getElementById('island-icon');
  const textEl = document.getElementById('island-text');

  const WAKE_QUIPS = [
    "still here 👀", "didn't go anywhere", "zzzz... oh hi",
    "back online", "wakey wakey ✨", "oh, hello there", "i'm back 💫",
  ];

  let queue = [];
  let busy  = false;

  function enqueue(icon, text, emotion) {
    queue.push({ icon, text, emotion });
    if (!busy) processNext();
  }

  function processNext() {
    if (!queue.length) { busy = false; return; }
    busy = true;
    run(queue.shift());
  }

  function run({ icon, text, emotion }) {
    eyeL.classList.add('look-up');
    eyeR.classList.add('look-up');
    face.classList.add('look-up');

    iconEl.textContent = icon;
    textEl.textContent = text;
    island.className = 'dot';

    setTimeout(() => {
      island.className = 'expanded';
      setTimeout(() => EmotionEngine.set(emotion), 300);
      setTimeout(collapse, 2600);
    }, 200);
  }

  function collapse() {
    island.className = 'dot';
    setTimeout(() => {
      eyeL.classList.remove('look-up');
      eyeR.classList.remove('look-up');
      face.classList.remove('look-up');
    }, 180);
    setTimeout(() => {
      island.className = 'gone';
      setTimeout(processNext, 150);
    }, 340);
  }

  function showWakeQuip() {
    const quip = WAKE_QUIPS[Math.floor(Math.random() * WAKE_QUIPS.length)];
    enqueue('', quip, 'happy');
  }

  return { notify: enqueue, showWakeQuip };
})();

/* ════════════════════════════
   5. TIME DISPLAY
════════════════════════════ */
const TimeDisplay = (() => {
  const display = document.getElementById('time-display');
  const digits  = {
    h1: document.getElementById('d-h1'), h2: document.getElementById('d-h2'),
    m1: document.getElementById('d-m1'), m2: document.getElementById('d-m2'),
  };
  let lastTime = ''; let visible = false; let ticker = null;

  function updateDigit(el, val) {
    if (el.textContent === val) return;
    el.classList.add('changing');
    setTimeout(() => { el.textContent = val; el.classList.remove('changing'); }, 200);
  }

  function tick() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const t = h + m;
    if (t !== lastTime) {
      updateDigit(digits.h1, h[0]); updateDigit(digits.h2, h[1]);
      updateDigit(digits.m1, m[0]); updateDigit(digits.m2, m[1]);
      lastTime = t;
    }
  }

  function show() {
    if (visible) return; visible = true;
    tick(); display.classList.add('visible');
    ticker = setInterval(tick, 10000);
  }

  function hide() {
    if (!visible) return; visible = false;
    display.classList.remove('visible');
    clearInterval(ticker);
  }

  return { show, hide };
})();

/* ════════════════════════════
   6. PASSIVE SYSTEM
════════════════════════════ */
const PassiveSystem = (() => {
  // Real timings
  const IDLE_AFTER = 45000;   // 45s → go idle
  const DOZE_AFTER = 600000;  // 10 min → dozing
  const WAKE_AFTER = 300000;  // 5 min → auto wake

  let stage = 'active';
  let idleTimer = null, dozeTimer = null, wakeTimer = null;

  function setStage(s) { stage = s; }

  function goIdle() {
    if (stage !== 'active') return;
    setStage('idle');
    EmotionEngine.set('idle');
    face.className = 'idle-anim';
    face.style.transform = '';
    TimeDisplay.show();
    dozeTimer = setTimeout(goDozing, DOZE_AFTER);
  }

  function goDozing() {
    if (stage !== 'idle') return;
    setStage('dozing');
    EmotionEngine.set('dozing');
    face.className = 'doze-anim';
    face.style.transform = '';
    setTimeout(() => BlinkEngine.dozeBlink(), 2000);
    wakeTimer = setTimeout(autoWake, WAKE_AFTER);
  }

  function autoWake() {
    if (stage !== 'dozing') return;
    setStage('waking');
    EmotionEngine.set('idle');
    face.className = 'idle-anim';
    face.style.transform = '';

    setTimeout(() => {
      const dir = Math.random() < 0.5 ? 'glance-left' : 'glance-right';
      eyeL.classList.add(dir); eyeR.classList.add(dir);
      setTimeout(() => {
        eyeL.classList.remove(dir); eyeR.classList.remove(dir);
        setTimeout(() => {
          IslandEngine.showWakeQuip();
          setStage('idle');
          dozeTimer = setTimeout(goDozing, DOZE_AFTER);
        }, 500);
      }, 1400);
    }, 900);
  }

  function surpriseWake() {
    clearTimeout(wakeTimer); clearTimeout(dozeTimer);
    setStage('active');
    EmotionEngine.set('surprised');
    face.className = 'idle-anim';
    face.style.transition = 'transform 200ms cubic-bezier(0.34,1.8,0.64,1)';
    face.style.transform  = 'scale(1.09)';
    setTimeout(() => {
      face.style.transform = 'scale(1)';
      setTimeout(() => {
        EmotionEngine.set('idle');
        TimeDisplay.hide();
      }, 900);
    }, 260);
  }

  function onInteract() {
    clearTimeout(idleTimer); clearTimeout(dozeTimer); clearTimeout(wakeTimer);
    if (stage === 'dozing') { surpriseWake(); return; }
    if (stage !== 'active') {
      setStage('active');
      EmotionEngine.set('idle');
      face.className = 'idle-anim';
      TimeDisplay.hide();
    }
    idleTimer = setTimeout(goIdle, IDLE_AFTER);
  }

  function start() { idleTimer = setTimeout(goIdle, IDLE_AFTER); }
  return { start, onInteract };
})();

/* ════════════════════════════
   7. TTS ENGINE
════════════════════════════ */
const TTSEngine = (() => {
  function cleanForSpeech(text) {
    return text
      .replace(/[\u{1F000}-\u{1FFFF}|\u{2600}-\u{26FF}|\u{2700}-\u{27BF}|\u{FE00}-\u{FEFF}|\u{1F900}-\u{1F9FF}|\u{1FA00}-\u{1FA9F}]/gu, '')
      .replace(/\*\*/g, '').replace(/\*/g, '')
      .replace(/^[\s•\-–]+/gm, '')
      .replace(/https?:\/\/\S+/g, '')
      .replace(/\n+/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function speak(text, emotion = 'idle') {
    if (!text) return;
    const cleanText = cleanForSpeech(text);
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(cleanText);
    utt.rate   = 0.95;
    utt.pitch  = 1.0;
    utt.volume = 1;

    const setVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes('Google UK English Female') ||
        v.name.includes('Samantha') ||
        v.name.includes('Karen') ||
        v.name.includes('Veena') ||
        (v.lang === 'en-US' && v.name.toLowerCase().includes('female'))
      ) || voices.find(v => v.lang === 'en-US' && v.gender === 'female')
        || voices.find(v => v.lang === 'en-IN');
      if (preferred) utt.voice = preferred;
    };

    if (window.speechSynthesis.getVoices().length) {
      setVoice();
    } else {
      window.speechSynthesis.onvoiceschanged = setVoice;
    }

    utt.onstart = () => {
      EmotionEngine.set(emotion);
      EmotionEngine.setSpeaking(true);
      setStatus('speaking…');
      PassiveSystem.onInteract(); // Reset passive timer on speak
    };

    utt.onend = () => {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    utt.onerror = () => {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    window.speechSynthesis.speak(utt);
  }

  return { speak };
})();

/* ════════════════════════════
   8. WEBSOCKET ENGINE
════════════════════════════ */
const WSEngine = (() => {
  let ws        = null;
  let authToken = null;

  const EMOTION_MAP = {
    'neutral':  'idle',  'positive': 'happy', 'negative': 'sad',
    'curious':  'thinking', 'error': 'sad',
    'happy': 'happy', 'sad': 'sad', 'thinking': 'thinking',
    'surprised': 'surprised', 'listening': 'listening',
  };

  const INTENT_EMOTIONS = {
    'CHAT': 'happy', 'WEATHER': 'happy', 'CALENDAR': 'happy',
    'MEMORY': 'happy', 'WEB_SEARCH': 'thinking', 'COMPUTER': 'happy',
    'SYSTEM_INFO': 'happy', 'FILE_READ': 'thinking',
    'CALCULATOR': 'happy', 'TIME': 'happy',
  };

  function init(token) { authToken = token; connect(); }

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(RAILWAY_WS);
    ws.onopen    = () => ws.send(JSON.stringify({ type: 'auth', token: authToken }));
    ws.onmessage = (event) => { try { handleResponse(JSON.parse(event.data)); } catch(e) { console.error('WS parse error:', e); } };
    ws.onclose   = () => setTimeout(connect, 3000);
    ws.onerror   = (e) => console.error('WS error:', e);
  }

  function send(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) { IslandEngine.notify('⚠️', 'Not connected', 'sad'); return; }
    ws.send(JSON.stringify({ message: text }));
  }

  function handleResponse(data) {
    let reply = '', emotion = 'happy', notifText = '', notifIcon = '💬', intent = '';
    if (typeof data === 'string') { reply = data; }
    else {
      reply     = data.reply     || data.message || data.response || '';
      emotion   = data.emotion   || 'happy';
      notifText = data.notification || '';
      notifIcon = data.icon      || '💬';
      intent    = data.intent    || '';
    }
    if (!reply) return;

    let faceEmotion = EMOTION_MAP[emotion] || emotion;
    if (faceEmotion === 'idle' || faceEmotion === 'neutral') {
      faceEmotion = INTENT_EMOTIONS[intent] || 'happy';
    }

    if (notifIcon === '💬') {
      const intentIcons = {
        'WEATHER': '🌤', 'CALENDAR': '📅', 'MEMORY': '💾',
        'WEB_SEARCH': '🔍', 'COMPUTER': '💻', 'SYSTEM_INFO': '🖥',
        'FILE_READ': '📄', 'CALCULATOR': '🧮', 'TIME': '🕐',
      };
      notifIcon = intentIcons[intent] || '💬';
    }

    const displayText = notifText || (reply.length > 32 ? reply.slice(0, 30) + '…' : reply);
    IslandEngine.notify(notifIcon, displayText, faceEmotion);
    setTimeout(() => TTSEngine.speak(reply, faceEmotion), 600);
  }

  return { init, send };
})();

/* ════════════════════════════
   9. VOICE ENGINE
════════════════════════════ */
const VoiceEngine = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('SpeechRecognition not supported'); return { start: () => {} }; }

  let recognition = null;
  let listening   = false;

  function build() {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recognition.onstart = () => {
      listening = true;
      EmotionEngine.set('listening');
      micRing.classList.add('active');
      setStatus('listening…');
      showTranscript('');
      PassiveSystem.onInteract();
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t) : (interim += t);
      }
      showTranscript(final || interim);
      if (final) onFinal(final.trim());
    };

    recognition.onerror = (e) => {
      console.error('SR error:', e.error);
      stopListening();
      if (e.error === 'no-speech') IslandEngine.notify('👂', 'Nothing heard — try again', 'sad');
    };

    recognition.onend = () => { listening = false; micRing.classList.remove('active'); };
  }

  function onFinal(text) {
    if (!text) return;
    stopListening();
    EmotionEngine.set('thinking');
    setStatus('thinking…');
    showTranscript(text);
    IslandEngine.notify('🔍', text.length > 28 ? text.slice(0, 26) + '…' : text, 'thinking');
    setTimeout(() => WSEngine.send(text), 300);
    setTimeout(() => hideTranscript(), 3000);
  }

  function start() {
    if (listening) { stop(); return; }
    build();
    try { recognition.start(); } catch(e) { console.error('SR start failed:', e); }
  }

  function stop() {
    if (recognition) recognition.stop();
    stopListening();
  }

  function stopListening() {
    listening = false;
    micRing.classList.remove('active');
    setStatus('tap to speak');
  }

  return { start, stop };
})();

/* ════════════════════════════
   10. UI HELPERS
════════════════════════════ */
function setStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.toggle('visible', text !== 'tap to speak');
}
function showTranscript(text) {
  if (!text) return;
  transcriptEl.textContent = text;
  transcriptEl.classList.add('show');
}
function hideTranscript() { transcriptEl.classList.remove('show'); }

/* ════════════════════════════
   11. FIREBASE LOGIN
════════════════════════════ */
function bootMainScreen(token, name) {
  document.getElementById('login-screen').classList.add('hide');
  document.getElementById('main-screen').classList.add('show');
  EmotionEngine.set('idle');
  BlinkEngine.start();
  IdleEngine.start();
  PassiveSystem.start();
  WSEngine.init(token);
  setTimeout(() => {
    const greeting = name ? `Hey ${name}, I'm awake!` : "Hey, I'm awake!";
    IslandEngine.notify('👋', greeting, 'happy');
    const spokenGreeting = name ? `Hey ${name}! Tap me anytime.` : "Hey! Tap me anytime.";
    setTimeout(() => TTSEngine.speak(spokenGreeting, 'happy'), 800);
  }, 800);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  if (!email || !pass) { errEl.textContent = 'Enter email and password.'; return; }
  errEl.textContent = '';
  try {
    await fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const cred  = await fbAuth.signInWithEmailAndPassword(email, pass);
    const token = await cred.user.getIdToken();
    const name  = cred.user.displayName ? cred.user.displayName.split(' ')[0] : '';
    bootMainScreen(token, name);
  } catch(err) {
    const msgs = {
      'auth/invalid-credential': 'Wrong email or password.',
      'auth/user-not-found':     'No account found.',
      'auth/wrong-password':     'Wrong password.',
      'auth/invalid-email':      'Invalid email format.',
      'auth/too-many-requests':  'Too many attempts — try later.',
    };
    document.getElementById('login-error').textContent = msgs[err.code] || 'Login failed. Try again.';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

fbAuth.onAuthStateChanged(async (user) => {
  if (user) {
    const token = await user.getIdToken();
    const name  = user.displayName ? user.displayName.split(' ')[0] : '';
    bootMainScreen(token, name);
  }
});

/* ════════════════════════════
   12. TAP TO SPEAK
════════════════════════════ */
document.getElementById('scene').addEventListener('click', () => {
  PassiveSystem.onInteract();
  if (['speaking', 'thinking', 'dozing'].includes(EmotionEngine.get())) return;
  if (document.body.getAttribute('data-speaking') === 'true') return;
  VoiceEngine.start();
});
