<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#000000"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Rexy</title>

  <!-- ▸ NEW: Outfit font for chat panel heading -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --face:    #ffffff;
      --eye-w:   90px;
      --eye-h:   110px;
      --eye-gap: 80px;
      /* ▸ NEW: panel vars */
      --glass-bg:     rgba(10, 11, 13, 0.80);
      --glass-border: rgba(255,255,255,0.07);
      --glass-blur:   blur(32px) saturate(160%);
      --panel-width:  40%;
      --spring:       cubic-bezier(0.32, 0.72, 0, 1);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      touch-action: none;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      color: #fff;
    }

    /* ════════════════════════════════
       LOGIN SCREEN
    ════════════════════════════════ */
    #login-screen {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 600ms ease, transform 600ms cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #login-screen.hide { opacity: 0; pointer-events: none; transform: scale(0.96); }

    .login-face { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 36px; animation: breathe 4s ease-in-out infinite; }
    .login-eyes { display: flex; gap: 22px; }
    .login-eye  { width: 28px; height: 34px; background: #fff; border-radius: 12px; }
    .login-mouth{ width: 20px; height: 5px; background: #fff; border-radius: 5px; }

    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: #444; margin-bottom: 36px; }

    .login-form { display: flex; flex-direction: column; gap: 12px; width: 300px; }
    .login-form input {
      background: #111; border: 1px solid #222; border-radius: 14px;
      padding: 14px 18px; font-size: 15px; color: #fff; outline: none;
      transition: border-color 200ms;
      -webkit-appearance: none; appearance: none;
    }
    .login-form input:focus { border-color: #444; }
    .login-form input::placeholder { color: #333; }

    .login-btn {
      background: #fff; color: #000; border: none; border-radius: 14px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
      transition: transform 100ms;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; appearance: none;
    }
    .login-btn:active { transform: scale(0.97); }
    #login-error { font-size: 12px; color: #ff4444; text-align: center; min-height: 18px; margin-top: 4px; }

    /* ════════════════════════════════
       MAIN SCREEN
    ════════════════════════════════ */
    #main-screen { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 800ms ease; }
    #main-screen.show { opacity: 1; pointer-events: all; }

    #scene {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      /* ▸ NEW: blur transition for when chat panel opens */
      transition: filter 0.45s ease, opacity 0.45s ease;
    }
    /* ▸ NEW: face dims when chat panel is open */
    #scene.panel-blurred {
      filter: blur(5px);
      opacity: 0.45;
      pointer-events: none;
    }

    /* ── Face ── */
    #face {
      display: flex; flex-direction: column; align-items: center; gap: 36px;
      will-change: transform;
    }

    #face.idle-anim { animation: breathe 4s ease-in-out infinite; }
    #face.doze-anim { animation: doze-sway 7s ease-in-out infinite; }
    #face.look-up {
      animation: none !important;
      transform: translateY(-18px) !important;
      transition: transform 500ms cubic-bezier(0.34, 1.3, 0.64, 1) !important;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);      }
      50%       { transform: scale(1.018); }
    }
    @keyframes doze-sway {
      0%, 100% { transform: scale(1)     translateY(0);    }
      30%       { transform: scale(1.006) translateY(-2px); }
      70%       { transform: scale(0.996) translateY(2px);  }
    }

    /* ── Eyes wrapper ── */
    #eyes-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Normal eyes row */
    #eyes {
      display: flex;
      align-items: center;
      gap: var(--eye-gap);
      transition: opacity 600ms ease;
    }

    /* ── Eye shell — each eye uses overflow+lid ── */
    .eye-shell {
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      flex-shrink: 0;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity       200ms ease;
      will-change: transform, height, border-radius;
      transform-origin: center center;
    }

    .eye-fill {
      width: 100%; height: 100%;
      background: #ffffff;
      border-radius: inherit;
    }

    /* Eyelid — slides down from top for dozing */
    .eye-lid {
      position: absolute;
      top: 0; left: -1px; right: -1px;
      height: 0;
      background: #000000;
      border-radius: 0 0 6px 6px;
      transition: height 800ms cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }

    /* Blink */
    .eye-shell.blink      { transform: scaleY(0.05) !important; transition: transform 80ms ease-in !important; }
    .eye-shell.blink-open { transform: scaleY(1)    !important; transition: transform 100ms ease-out !important; }
    .eye-shell.glance-left  { transform: translateX(-12px); }
    .eye-shell.glance-right { transform: translateX(12px);  }
    .eye-shell.look-up      { transform: translateY(-10px) !important; }

    /* ── EYE EMOTIONS ── */
    body[data-emotion="idle"]      .eye-shell { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="listening"] .eye-shell { width: 80px; height: 130px; border-radius: 50px; }
    body[data-emotion="happy"]     .eye-shell { width: 100px; height: 72px; border-radius: 80px 80px 8px 8px; }
    body[data-emotion="sad"]       .eye-shell { width: 78px; height: 118px; border-radius: 44px 44px 28px 28px / 60px 60px 30px 30px; }
    body[data-emotion="sad"]     #eye-r { transform: rotate(4deg); }
    body[data-emotion="sad"]     #eye-l { transform: rotate(-4deg); }
    body[data-emotion="thinking"] #eye-l { width: var(--eye-w); height: 44px; border-radius: 28px; }
    body[data-emotion="thinking"] #eye-r { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="surprised"] .eye-shell { width: 100px; height: 148px; border-radius: 60px; }

    /* Dozing — keep idle size, lids slide down */
    body[data-emotion="dozing"] .eye-shell { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="dozing"] #eye-l .eye-lid { height: 88px;  }
    body[data-emotion="dozing"] #eye-r .eye-lid { height: 96px;  }
    body:not([data-emotion="dozing"]) .eye-lid  { height: 0 !important; }

    /* ── ZZZ ── */
    #zzz-wrap {
      position: absolute;
      top: -20px; right: -54px;
      opacity: 0;
      transition: opacity 1000ms ease;
      pointer-events: none;
      z-index: 10;
    }
    body[data-emotion="dozing"] #zzz-wrap { opacity: 1; }

    .z {
      position: absolute;
      color: #ffffff; font-weight: 200;
      opacity: 0;
      animation: floatZ 3.4s ease-in-out infinite;
      pointer-events: none;
    }
    .z1 { font-size: 12px; animation-delay: 0s;    top: 0px;   left: 0px;  }
    .z2 { font-size: 17px; animation-delay: 1.1s;  top: -18px; left: 16px; }
    .z3 { font-size: 10px; animation-delay: 2.2s;  top: -32px; left: 34px; }

    @keyframes floatZ {
      0%   { opacity: 0;    transform: translateY(0px)   scale(0.7); }
      15%  { opacity: 0.55; transform: translateY(-6px)  scale(1);   }
      75%  { opacity: 0.15; transform: translateY(-28px) scale(0.85);}
      100% { opacity: 0;    transform: translateY(-44px) scale(0.6); }
    }

    /* ── MOUTH — base states ── */
    #mouth {
      width: 64px; height: 14px;
      background: var(--face);
      border-radius: 12px;
      align-self: center;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity       400ms ease;
    }

    body[data-emotion="idle"]      #mouth { width: 64px;  height: 14px; border-radius: 12px; transform: none; opacity: 1; }
    body[data-emotion="happy"]     #mouth { width: 96px;  height: 20px; border-radius: 0 0 60px 60px / 0 0 28px 28px; opacity: 1; }
    body[data-emotion="sad"]       #mouth { width: 80px;  height: 20px; border-radius: 60px 60px 0 0 / 28px 28px 0 0; opacity: 1; }
    body[data-emotion="thinking"]  #mouth { width: 20px;  height: 20px; border-radius: 50%; transform: translateX(12px); opacity: 1; }
    body[data-emotion="listening"] #mouth { width: 40px;  height: 22px; border-radius: 50%; opacity: 1; }
    body[data-emotion="surprised"] #mouth { width: 52px;  height: 52px; border-radius: 50%; opacity: 1; }
    body[data-emotion="dozing"]    #mouth { width: 22px;  height: 14px; border-radius: 50%; opacity: 0.45; }

    /* ── SPEAKING OVERLAY ── */
    body[data-speaking="true"] #mouth {
      width: 56px !important; height: 28px !important;
      border-radius: 50% !important; transform: none !important;
      animation: speak-pulse 0.4s ease-in-out infinite alternate !important;
      transition: none !important;
    }
    @keyframes speak-pulse {
      from { height: 18px; }
      to   { height: 40px; }
    }

    /* ── TIME display ── */
    #time-display {
      position: fixed; bottom: 28px; right: 28px;
      font-size: 15px; font-weight: 300; letter-spacing: 0.14em;
      color: #333; opacity: 0; transition: opacity 1200ms ease;
      pointer-events: none; z-index: 100;
      font-variant-numeric: tabular-nums;
    }
    #time-display.visible { opacity: 1; }
    .digit { display: inline-block; transition: opacity 300ms ease; }
    .digit.changing { opacity: 0; }

    /* ── Mic ring ── */
    #mic-ring {
      position: fixed; inset: 0;
      border: 2px solid rgba(255,255,255,0);
      pointer-events: none; z-index: 10;
      transition: border-color 400ms ease;
    }
    #mic-ring.active {
      border-color: rgba(255,255,255,0.08);
      animation: ring-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { border-color: rgba(255,255,255,0.05); }
      50%       { border-color: rgba(255,255,255,0.14); }
    }

    /* ── Status ── */
    #status {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: #2a2a2a; letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 300ms; pointer-events: none; white-space: nowrap; z-index: 20;
    }
    #status.visible { color: #3a3a3a; }

    /* ── Transcript ── */
    #transcript-bubble {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #222; border-radius: 18px;
      padding: 10px 18px; font-size: 13px; color: #888; max-width: 280px;
      text-align: center; opacity: 0; transition: opacity 300ms;
      pointer-events: none; z-index: 20; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    #transcript-bubble.show { opacity: 1; }

    /* ════════════════════════════════
       NOTIFICATION ISLAND
    ════════════════════════════════ */
    #island-wrap {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
    }
    #island {
      background: #ffffff; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      width: 10px; height: 10px; opacity: 0;
      transition: width 280ms cubic-bezier(0.34,1.3,0.64,1), height 280ms cubic-bezier(0.34,1.3,0.64,1), opacity 180ms ease;
      will-change: width, height, opacity;
    }
    #island.dot      { width: 10px;  height: 10px;  opacity: 1; }
    #island.expanded { width: 260px; height: 44px;  opacity: 1; }
    #island.gone     { width: 10px;  height: 10px;  opacity: 0; }
    #island-content {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 0 18px; width: 100%;
      opacity: 0; transform: scale(0.88);
      transition: opacity 180ms ease 100ms, transform 240ms cubic-bezier(0.34,1.56,0.64,1) 100ms;
      pointer-events: none;
    }
    #island.expanded #island-content { opacity: 1; transform: scale(1); }
    #island-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
    #island-text { font-size: 13.5px; font-weight: 600; letter-spacing: -0.015em; color: #000; white-space: nowrap; }

    /* ── Vignette ── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, #000 100%);
      pointer-events: none; z-index: 50;
    }

    /* ════════════════════════════════
       ▸ NEW: CHAT TOGGLE BUTTON
    ════════════════════════════════ */
    #chat-toggle {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100; /* panel (150) slides over this */
      width: 46px; height: 46px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none; /* hidden until logged in — shown by bootMainScreen */
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }
    #chat-toggle:hover  { background: rgba(255,255,255,0.12); }
    #chat-toggle:active { transform: scale(0.91); }
    #chat-toggle.visible { display: flex; }

    /* Blue dot badge */
    #chat-badge {
      position: absolute;
      top: 9px; right: 9px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7ec8ff;
      box-shadow: 0 0 6px rgba(100,180,255,0.9);
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 0; transform: scale(0);
    }
    #chat-badge.show { opacity: 1; transform: scale(1); }

    /* ════════════════════════════════
       ▸ NEW: CHAT PANEL
    ════════════════════════════════ */
    #chat-panel {
      position: fixed;
      top: 0; left: 0;
      width: var(--panel-width);
      height: 100%;
      z-index: 150;
      transform: translateX(-100%);
      transition: transform 0.48s var(--spring);
      will-change: transform;
    }
    #chat-panel.open { transform: translateX(0); }

    #panel-glass {
      width: 100%; height: 100%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--glass-border);
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 4px 0 40px rgba(0,0,0,0.7), inset -1px 0 0 rgba(255,255,255,0.05);
    }

    #panel-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 52px 18px 14px;
      border-bottom: 1px solid var(--glass-border);
    }

    /* ▸ Outfit font for heading */
    #panel-title {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    #panel-close {
      width: 28px; height: 28px;
      border-radius: 8px; border: none;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #panel-close:hover { background: rgba(255,255,255,0.13); color: #fff; }

    #panel-messages {
      flex: 1; overflow-y: auto;
      padding: 18px 14px 16px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    #panel-messages::-webkit-scrollbar { width: 2px; }
    #panel-messages::-webkit-scrollbar-track { background: transparent; }
    #panel-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .pmsg-row { display: flex; align-items: flex-end; gap: 8px; animation: pmsg-in 0.28s ease forwards; opacity: 0; transform: translateX(-8px); }
    .pmsg-row.user { flex-direction: row-reverse; animation-name: pmsg-in-r; }
    @keyframes pmsg-in   { to { opacity:1; transform:translateX(0); } }
    @keyframes pmsg-in-r { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }

    .pmsg-avatar {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    .pmsg-avatar.rexy { background: rgba(80,160,255,0.15); color: #a8d4ff; border: 1px solid rgba(100,180,255,0.18); }
    .pmsg-avatar.user-av { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35); }

    .pmsg-col { display: flex; flex-direction: column; max-width: 80%; }
    .pmsg-row.user .pmsg-col { align-items: flex-end; }

    .pmsg-bubble { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.55; word-break: break-word; }
    .pmsg-bubble.rexy { background: rgba(90,160,255,0.13); border: 1px solid rgba(100,180,255,0.1); color: #eef2ff; border-bottom-left-radius: 4px; }
    .pmsg-bubble.user { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); border-bottom-right-radius: 4px; }

    .pmsg-time { font-size: 9.5px; color: rgba(255,255,255,0.2); font-family: 'Courier New', monospace; margin-top: 4px; padding: 0 2px; }

    #panel-voice-hint {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 11px 0 16px;
      border-top: 1px solid var(--glass-border);
      color: rgba(255,255,255,0.18); font-size: 10px; letter-spacing: 0.08em;
      font-family: 'Courier New', monospace;
    }
    .pvdot { width: 4px; height: 4px; border-radius: 50%; background: rgba(100,180,255,0.45); animation: pvp 1.8s ease-in-out infinite; }
    .pvdot:nth-child(2) { animation-delay: 0.25s; }
    .pvdot:nth-child(3) { animation-delay: 0.5s; }
    @keyframes pvp { 0%,100%{opacity:0.3;transform:scaleY(1);} 50%{opacity:1;transform:scaleY(1.8);} }

    /* ▸ Overlay (tap outside to close) */
    #panel-overlay {
      position: fixed; inset: 0; z-index: 140;
      display: none;
      background: rgba(0,0,0,0.2);
    }
    #panel-overlay.visible { display: block; }
  </style>
</head>

<body data-emotion="idle" data-speaking="false">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-face">
    <div class="login-eyes"><div class="login-eye"></div><div class="login-eye"></div></div>
    <div class="login-mouth"></div>
  </div>
  <div class="login-title">Hey, I'm Rexy.</div>
  <div class="login-sub">Sign in to wake me up.</div>
  <div class="login-form">
    <input type="email"    id="login-email" placeholder="Email"    autocomplete="email"/>
    <input type="password" id="login-pass"  placeholder="Password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div id="vignette"></div>
  <div id="mic-ring"></div>

  <!-- Time display -->
  <div id="time-display">
    <span class="digit" id="d-h1"></span><span class="digit" id="d-h2"></span><span style="opacity:0.5">:</span><span class="digit" id="d-m1"></span><span class="digit" id="d-m2"></span>
  </div>

  <!-- Notification Island -->
  <div id="island-wrap">
    <div id="island" class="gone">
      <div id="island-content">
        <span id="island-icon"></span>
        <span id="island-text"></span>
      </div>
    </div>
  </div>

  <!-- Face -->
  <div id="scene">
    <div id="face" class="idle-anim">
      <div id="eyes-wrapper">
        <div id="eyes">
          <div class="eye-shell" id="eye-l"><div class="eye-fill"></div><div class="eye-lid"></div></div>
          <div class="eye-shell" id="eye-r"><div class="eye-fill"></div><div class="eye-lid"></div></div>
        </div>
        <div id="zzz-wrap">
          <span class="z z1">z</span><span class="z z2">z</span><span class="z z3">z</span>
        </div>
      </div>
      <div id="mouth"></div>
    </div>
  </div>

  <div id="status">tap to speak</div>

<script>
/* ═══════════════════════════════════════════════════════

const eyeL         = document.getElementById('eye-l');

/* ════════════════════════════
   1. EMOTION ENGINE
════════════════════════════ */
const EmotionEngine = (() => {
  let current     = 'idle';
  let returnTimer = null;

  function set(emotion, duration = null) {
    current = emotion;
    document.body.setAttribute('data-emotion', emotion);
    if (returnTimer) clearTimeout(returnTimer);
    if (duration) returnTimer = setTimeout(() => set('idle'), duration);
  }

  function setSpeaking(active) {
    document.body.setAttribute('data-speaking', active ? 'true' : 'false');
  }

  function get() { return current; }
  return { set, get, setSpeaking };
})();

/* ════════════════════════════
   2. BLINK ENGINE
════════════════════════════ */
const BlinkEngine = (() => {
  function blink() {
    const e = EmotionEngine.get();
    if (['sad','surprised','dozing'].includes(e)) { schedule(); return; }
    if (document.body.getAttribute('data-speaking') === 'true') { schedule(); return; }

    eyeL.classList.add('blink'); eyeR.classList.add('blink');
    setTimeout(() => {
      eyeL.classList.remove('blink'); eyeR.classList.remove('blink');
      eyeL.classList.add('blink-open'); eyeR.classList.add('blink-open');
      setTimeout(() => {
        eyeL.classList.remove('blink-open'); eyeR.classList.remove('blink-open');
        schedule();
      }, 120);
    }, 100);
  }

  function dozeBlink() {
    if (EmotionEngine.get() !== 'dozing') return;
    const lL = eyeL.querySelector('.eye-lid');
    const lR = eyeR.querySelector('.eye-lid');
    lL.style.transition = 'height 200ms ease';
    lR.style.transition = 'height 200ms ease';
    lL.style.height = '110px';
    lR.style.height = '110px';
    setTimeout(() => {
      lL.style.transition = 'height 300ms ease';
      lR.style.transition = 'height 300ms ease';
      lL.style.height = '88px';
      lR.style.height = '96px';
      setTimeout(() => {
        lL.style.transition = '';
        lR.style.transition = '';
        if (EmotionEngine.get() === 'dozing')
          setTimeout(dozeBlink, 6000 + Math.random() * 6000);
      }, 350);
    }, 280);
  }

  function schedule() { setTimeout(blink, 4000 + Math.random() * 5000); }
  function start()    { schedule(); }
  return { start, dozeBlink };
})();

/* ════════════════════════════
   3. IDLE ENGINE
════════════════════════════ */
const IdleEngine = (() => {
  function glance() {
    if (EmotionEngine.get() !== 'idle') { scheduleGlance(); return; }
    const dir = Math.random() < 0.5 ? 'glance-left' : 'glance-right';
    eyeL.classList.add(dir); eyeR.classList.add(dir);
    setTimeout(() => {
      eyeL.classList.remove(dir); eyeR.classList.remove(dir);
      scheduleGlance();
    }, 700 + Math.random() * 700);
  }
  function scheduleGlance() { setTimeout(glance, 5000 + Math.random() * 8000); }

  function drift() {
    if (EmotionEngine.get() !== 'idle') { face.style.transform = ''; scheduleDrift(); return; }
    face.style.transition = 'transform 3s ease-in-out';
    face.style.transform  = `translate(${(Math.random()-0.5)*6}px,${(Math.random()-0.5)*4}px)`;
    scheduleDrift();
  }
  function scheduleDrift() { setTimeout(drift, 3000 + Math.random() * 4000); }

  function start() { scheduleGlance(); scheduleDrift(); }
  return { start };
})();

/* ════════════════════════════
   4. ISLAND ENGINE
════════════════════════════ */
const IslandEngine = (() => {
  const island = document.getElementById('island');
  const iconEl = document.getElementById('island-icon');
  const textEl = document.getElementById('island-text');

  const WAKE_QUIPS = [
    "still here 👀", "didn't go anywhere", "zzzz... oh hi",
    "back online", "wakey wakey ✨", "oh, hello there", "i'm back 💫",
  ];

  let queue = [];
  let busy  = false;

  function enqueue(icon, text, emotion) {
    queue.push({ icon, text, emotion });
    if (!busy) processNext();
  }

  function processNext() {
    if (!queue.length) { busy = false; return; }
    busy = true;
    run(queue.shift());
  }

  function run({ icon, text, emotion }) {
    eyeL.classList.add('look-up');
    eyeR.classList.add('look-up');
    face.classList.add('look-up');

    iconEl.textContent = icon;
    textEl.textContent = text;
    island.className = 'dot';

    setTimeout(() => {
      island.className = 'expanded';
      setTimeout(() => EmotionEngine.set(emotion), 300);
      setTimeout(collapse, 2600);
    }, 200);
  }

  function collapse() {
    island.className = 'dot';
    setTimeout(() => {
      eyeL.classList.remove('look-up');
      eyeR.classList.remove('look-up');
      face.classList.remove('look-up');
    }, 180);
    setTimeout(() => {
      island.className = 'gone';
      setTimeout(processNext, 150);
    }, 340);
  }

  function showWakeQuip() {
    const quip = WAKE_QUIPS[Math.floor(Math.random() * WAKE_QUIPS.length)];
    enqueue('', quip, 'happy');
  }

  return { notify: enqueue, showWakeQuip };
})();

/* ════════════════════════════
   5. TIME DISPLAY
════════════════════════════ */
const TimeDisplay = (() => {
  const display = document.getElementById('time-display');
  const digits  = {
    h1: document.getElementById('d-h1'), h2: document.getElementById('d-h2'),
    m1: document.getElementById('d-m1'), m2: document.getElementById('d-m2'),
  };
  let lastTime = ''; let visible = false; let ticker = null;

  function updateDigit(el, val) {
    if (el.textContent === val) return;
    el.classList.add('changing');
    setTimeout(() => { el.textContent = val; el.classList.remove('changing'); }, 200);
  }

  function tick() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const t = h + m;
    if (t !== lastTime) {
      updateDigit(digits.h1, h[0]); updateDigit(digits.h2, h[1]);
      updateDigit(digits.m1, m[0]); updateDigit(digits.m2, m[1]);
      lastTime = t;
    }
  }

  function show() {
    if (visible) return; visible = true;
    tick(); display.classList.add('visible');
    ticker = setInterval(tick, 10000);
  }

  function hide() {
    if (!visible) return; visible = false;
    display.classList.remove('visible');
    clearInterval(ticker);
  }

  return { show, hide };
})();

/* ════════════════════════════
   6. PASSIVE SYSTEM
════════════════════════════ */
const PassiveSystem = (() => {
  const IDLE_AFTER = 45000;
  const DOZE_AFTER = 600000;
  const WAKE_AFTER = 300000;

  let stage = 'active';
  let idleTimer = null, dozeTimer = null, wakeTimer = null;

  function setStage(s) { stage = s; }

  function goIdle() {
    if (stage !== 'active') return;
    setStage('idle');
    EmotionEngine.set('idle');
    face.className = 'idle-anim';
    face.style.transform = '';
    TimeDisplay.show();
    dozeTimer = setTimeout(goDozing, DOZE_AFTER);
  }

  function goDozing() {
    if (stage !== 'idle') return;
    setStage('dozing');
    EmotionEngine.set('dozing');
    face.className = 'doze-anim';
    face.style.transform = '';
    setTimeout(() => BlinkEngine.dozeBlink(), 2000);
    wakeTimer = setTimeout(autoWake, WAKE_AFTER);
  }

  function autoWake() {
    if (stage !== 'dozing') return;
    setStage('waking');
    EmotionEngine.set('idle');
    face.className = 'idle-anim';
    face.style.transform = '';

    setTimeout(() => {
      const dir = Math.random() < 0.5 ? 'glance-left' : 'glance-right';
      eyeL.classList.add(dir); eyeR.classList.add(dir);
      setTimeout(() => {
        eyeL.classList.remove(dir); eyeR.classList.remove(dir);
        setTimeout(() => {
          IslandEngine.showWakeQuip();
          setStage('idle');
          dozeTimer = setTimeout(goDozing, DOZE_AFTER);
        }, 500);
      }, 1400);
    }, 900);
  }

  function surpriseWake() {
    clearTimeout(wakeTimer); clearTimeout(dozeTimer);
    setStage('active');
    EmotionEngine.set('surprised');
    face.className = 'idle-anim';
    face.style.transition = 'transform 200ms cubic-bezier(0.34,1.8,0.64,1)';
    face.style.transform  = 'scale(1.09)';
    setTimeout(() => {
      face.style.transform = 'scale(1)';
      setTimeout(() => {
        EmotionEngine.set('idle');
        TimeDisplay.hide();
      }, 900);
    }, 260);
  }

  function onInteract() {
    clearTimeout(idleTimer); clearTimeout(dozeTimer); clearTimeout(wakeTimer);
    if (stage === 'dozing') { surpriseWake(); return; }
    if (stage !== 'active') {
      setStage('active');
      EmotionEngine.set('idle');
      face.className = 'idle-anim';
      TimeDisplay.hide();
    }
    idleTimer = setTimeout(goIdle, IDLE_AFTER);
  }

  function start() { idleTimer = setTimeout(goIdle, IDLE_AFTER); }
  return { start, onInteract };
})();

/* ════════════════════════════
   7. TTS ENGINE
════════════════════════════ */
const TTSEngine = (() => {
  function cleanForSpeech(text) {
    return text
      .replace(/[\u{1F000}-\u{1FFFF}|\u{2600}-\u{26FF}|\u{2700}-\u{27BF}|\u{FE00}-\u{FEFF}|\u{1F900}-\u{1F9FF}|\u{1FA00}-\u{1FA9F}]/gu, '')
      .replace(/\*\*/g, '').replace(/\*/g, '')
      .replace(/^[\s•\-–]+/gm, '')
      .replace(/https?:\/\/\S+/g, '')
      .replace(/\n+/g, '. ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function speak(text, emotion = 'idle') {
    if (!text) return;
    const cleanText = cleanForSpeech(text);
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(cleanText);
    utt.rate   = 0.95;
    utt.pitch  = 1.0;
    utt.volume = 1;

    const setVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes('Google UK English Female') ||
        v.name.includes('Samantha') ||
        v.name.includes('Karen') ||
        v.name.includes('Veena') ||
        (v.lang === 'en-US' && v.name.toLowerCase().includes('female'))
      ) || voices.find(v => v.lang === 'en-US' && v.gender === 'female')
        || voices.find(v => v.lang === 'en-IN');
      if (preferred) utt.voice = preferred;
    };

    if (window.speechSynthesis.getVoices().length) {
      setVoice();
    } else {
      window.speechSynthesis.onvoiceschanged = setVoice;
    }

    utt.onstart = () => {
      EmotionEngine.set(emotion);
      EmotionEngine.setSpeaking(true);
      setStatus('speaking…');
      PassiveSystem.onInteract();
    };

    utt.onend = () => {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    utt.onerror = () => {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    window.speechSynthesis.speak(utt);
  }

  function speakChunked(chunks, emotion, liveBubble) {
  if (!chunks || !chunks.length) return;
  window.speechSynthesis.cancel();
  EmotionEngine.set(emotion);
  EmotionEngine.setSpeaking(true);
  setStatus('speaking…');
  PassiveSystem.onInteract();

  let i = 0;

  function next() {
    if (i >= chunks.length) {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
      return;
    }
    const chunk = chunks[i++];
    ChatPanel.appendChunk(liveBubble, chunk);   // build text live

    const utt = new SpeechSynthesisUtterance(cleanForSpeech(chunk));
    utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1;

    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
      v.name.includes('Google UK English Female') ||
      v.name.includes('Samantha') ||
      v.name.includes('Karen') ||
      v.name.includes('Veena') ||
      (v.lang === 'en-US' && v.name.toLowerCase().includes('female'))
    ) || voices.find(v => v.lang === 'en-IN');
    if (preferred) utt.voice = preferred;

    utt.onend   = () => setTimeout(next, 100);   // 100ms pause between chunks
    utt.onerror = () => setTimeout(next, 200);   // don't get stuck on error
    window.speechSynthesis.speak(utt);
  }

  next();
}
  return { speak, speakChunked };
})();

/* ════════════════════════════
   8. WEBSOCKET ENGINE
════════════════════════════ */
const WSEngine = (() => {
  let ws        = null;
  let authToken = null;

  const EMOTION_MAP = {
    'neutral':  'idle',  'positive': 'happy', 'negative': 'sad',
    'curious':  'thinking', 'error': 'sad',
    'happy': 'happy', 'sad': 'sad', 'thinking': 'thinking',
    'surprised': 'surprised', 'listening': 'listening',
  };

  const INTENT_EMOTIONS = {
    'CHAT': 'happy', 'WEATHER': 'happy', 'CALENDAR': 'happy',
    'MEMORY': 'happy', 'WEB_SEARCH': 'thinking', 'COMPUTER': 'happy',
    'SYSTEM_INFO': 'happy', 'FILE_READ': 'thinking',
    'CALCULATOR': 'happy', 'TIME': 'happy',
  };

  function init(token) { authToken = token; connect(); }

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(RAILWAY_WS);
    ws.onopen    = () => ws.send(JSON.stringify({ type: 'auth', token: authToken }));
    ws.onmessage = (event) => { try { handleResponse(JSON.parse(event.data)); } catch(e) { console.error('WS parse error:', e); } };
    ws.onclose   = () => setTimeout(connect, 3000);
    ws.onerror   = (e) => console.error('WS error:', e);
  }

  function send(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) { IslandEngine.notify('⚠️', 'Not connected', 'sad'); return; }
    // ▸ Store user message before sending
    ChatPanel.addMessage('user', text);
    ws.send(JSON.stringify({ message: text }));
  }

  function handleResponse(data) {
    let reply = '', emotion = 'happy', notifText = '', notifIcon = '💬', intent = '';
    if (typeof data === 'string') { reply = data; }
    else {
      reply     = data.reply     || data.message || data.response || '';
      emotion   = data.emotion   || 'happy';
      notifText = data.notification || '';
      notifIcon = data.icon      || '💬';
      intent    = data.intent    || '';
    }
    if (!reply) return;

    let faceEmotion = EMOTION_MAP[emotion] || emotion;
    if (faceEmotion === 'idle' || faceEmotion === 'neutral') {
      faceEmotion = INTENT_EMOTIONS[intent] || 'happy';
    }

    if (notifIcon === '💬') {
      const intentIcons = {
        'WEATHER': '🌤', 'CALENDAR': '📅', 'MEMORY': '💾',
        'WEB_SEARCH': '🔍', 'COMPUTER': '💻', 'SYSTEM_INFO': '🖥',
        'FILE_READ': '📄', 'CALCULATOR': '🧮', 'TIME': '🕐',
      };
      notifIcon = intentIcons[intent] || '💬';
    }

    const displayText = notifText || (reply.length > 32 ? reply.slice(0, 30) + '…' : reply);
    IslandEngine.notify(notifIcon, displayText, faceEmotion);

// ▸ Store full reply immediately (badge + history)
    ChatPanel.addMessage('rexy', reply);

    // ▸ Chunked playback — text builds live in panel
    const chunks = (data.chunks && data.chunks.length) ? data.chunks : [reply];
    const liveBubble = ChatPanel.createLiveBubble();
    setTimeout(() => TTSEngine.speakChunked(chunks, faceEmotion, liveBubble), 600);
  }

  return { init, send };
})();

/* ════════════════════════════
   9. VOICE ENGINE
════════════════════════════ */
const VoiceEngine = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('SpeechRecognition not supported'); return { start: () => {} }; }

  let recognition = null;
  let listening   = false;

  function build() {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.continuous = true;          // ← was false

    let silenceTimer = null;
    let accumulated  = '';
    const SILENCE_MS = 1500;

    recognition.onstart = () => {
      listening   = true;
      accumulated = '';
      EmotionEngine.set('listening');
      micRing.classList.add('active');
      setStatus('listening…');
      showTranscript('');
      PassiveSystem.onInteract();
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t) : (interim += t);
      }

      if (final) accumulated += final;
      const display = accumulated + interim;
      if (display) showTranscript(display);

      // Reset silence timer on every new word
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        const toSend = accumulated || interim;
        if (toSend.trim()) onFinal(toSend.trim());
      }, SILENCE_MS);
    };

    recognition.onerror = (e) => {
      clearTimeout(silenceTimer);
      console.error('SR error:', e.error);
      stopListening();
      if (e.error === 'no-speech') IslandEngine.notify('👂', 'Nothing heard — try again', 'sad');
    };

    recognition.onend = () => {
      clearTimeout(silenceTimer);
      listening = false;
      micRing.classList.remove('active');
    };
  }

  // ── Acknowledgements — spoken while Rexy thinks ──
  const ACKNOWLEDGEMENTS = [
      "Alright…", "Got it…", "Sure…", "Let me think…", "One sec…"
  ];

  function speakAck() {
      const ack = ACKNOWLEDGEMENTS[Math.floor(Math.random() * ACKNOWLEDGEMENTS.length)];
      const utt = new SpeechSynthesisUtterance(ack);
      utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
          v.name.includes('Google UK English Female') ||
          v.name.includes('Samantha') ||
          v.name.includes('Karen') ||
          v.name.includes('Veena') ||
          (v.lang === 'en-US' && v.name.toLowerCase().includes('female'))
      ) || voices.find(v => v.lang === 'en-IN');
      if (preferred) utt.voice = preferred;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utt);
  }

  function onFinal(text) {
      if (!text) return;
      stopListening();
      EmotionEngine.set('thinking');
      setStatus('thinking…');
      showTranscript(text);
      IslandEngine.notify('🔍', text.length > 28 ? text.slice(0, 26) + '…' : text, 'thinking');
      speakAck();                                    // ← speak ack immediately
      setTimeout(() => WSEngine.send(text), 300);
      setTimeout(() => hideTranscript(), 3000);
  }

  function start() {
    if (listening) { stop(); return; }
    build();
    try { recognition.start(); } catch(e) { console.error('SR start failed:', e); }
  }

  function stop() {
    if (recognition) recognition.stop();
    stopListening();
  }

  function stopListening() {
    listening = false;
    micRing.classList.remove('active');
    setStatus('tap to speak');
  }

  return { start, stop };
})();

/* ════════════════════════════
   ▸ NEW: CHAT PANEL
════════════════════════════ */
const ChatPanel = (() => {
  const panel    = document.getElementById('chat-panel');
  const overlay  = document.getElementById('panel-overlay');
  const scene    = document.getElementById('scene');
  const badge    = document.getElementById('chat-badge');
  const msgsCont = document.getElementById('panel-messages');

  // Daily storage key — messages clear automatically on a new day
  const TODAY    = new Date().toISOString().slice(0, 10);
  const STORE_KEY = 'rexy_chat_' + TODAY;

  // Purge old day keys from localStorage
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('rexy_chat_') && k !== STORE_KEY) localStorage.removeItem(k);
  });

  let isOpen = false;

  // ── Storage helpers ──
  function loadMsgs() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { return []; }
  }
  function saveMsgs(msgs) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(msgs)); } catch {}
  }

  // ── Add a message (called by WSEngine) ──
  function addMessage(role, text) {
    const msgs = loadMsgs();
    const now  = new Date();
    msgs.push({
      role,
      text,
      time: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0')
    });
    saveMsgs(msgs);
    // Show badge only if panel is closed
    if (!isOpen) badge.classList.add('show');
  }

  // ── Render messages ──
  function render() {
    const msgs = loadMsgs();
    msgsCont.innerHTML = '';

    if (!msgs.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;color:rgba(255,255,255,0.2);font-size:12px;margin-top:40px;font-family:monospace;letter-spacing:0.1em;';
      empty.textContent = 'No conversations today yet.';
      msgsCont.appendChild(empty);
      return;
    }

    msgs.forEach((msg, i) => {
      const isUser = msg.role === 'user';
      const row = document.createElement('div');
      row.className = 'pmsg-row' + (isUser ? ' user' : '');
      row.style.animationDelay = i * 30 + 'ms';

      const av = document.createElement('div');
      av.className = 'pmsg-avatar ' + (isUser ? 'user-av' : 'rexy');
      av.textContent = isUser ? 'A' : 'R';

      const col = document.createElement('div');
      col.className = 'pmsg-col';

      const b = document.createElement('div');
      b.className = 'pmsg-bubble ' + (isUser ? 'user' : 'rexy');
      b.textContent = msg.text;

      const t = document.createElement('div');
      t.className = 'pmsg-time';
      t.textContent = msg.time;

      col.append(b, t);
      row.append(av, col);
      msgsCont.appendChild(row);
    });

    setTimeout(() => { msgsCont.scrollTop = msgsCont.scrollHeight; }, 60);
  }

  // ── Open / Close ──
  function open() {
    isOpen = true;
    panel.classList.add('open');
    overlay.classList.add('visible');
    scene.classList.add('panel-blurred');
    badge.classList.remove('show');
    render();
  }

  function close() {
    isOpen = false;
    panel.classList.remove('open');
    overlay.classList.remove('visible');
    scene.classList.remove('panel-blurred');
  }

  function toggle() { isOpen ? close() : open(); }

  // ── Swipe left to close ──
  let touchStartX = 0, touchStartY = 0;
  panel.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  panel.addEventListener('touchend', e => {
    if (!isOpen) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dx < -50 && dy < 60) close();
  }, { passive: true });

// ── Live bubble for chunked TTS display ──
  function createLiveBubble() {
    if (!isOpen) return null;
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const row = document.createElement('div');
    row.className = 'pmsg-row';
    const av = document.createElement('div');
    av.className = 'pmsg-avatar rexy';
    av.textContent = 'R';
    const col = document.createElement('div');
    col.className = 'pmsg-col';
    const b = document.createElement('div');
    b.className = 'pmsg-bubble rexy';
    b.textContent = '';
    const t = document.createElement('div');
    t.className = 'pmsg-time';
    t.textContent = timeStr;
    col.append(b, t);
    row.append(av, col);
    msgsCont.appendChild(row);
    msgsCont.scrollTop = msgsCont.scrollHeight;
    return b;
  }

  function appendChunk(bubbleEl, text) {
    if (!bubbleEl || !text) return;
    bubbleEl.textContent += (bubbleEl.textContent ? ' ' : '') + text;
    msgsCont.scrollTop = msgsCont.scrollHeight;
  }

  return { open, close, toggle, addMessage, createLiveBubble, appendChunk };
})();

/* ════════════════════════════
   10. UI HELPERS
════════════════════════════ */
function setStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.toggle('visible', text !== 'tap to speak');
}
function showTranscript(text) {
  if (!text) return;
  transcriptEl.textContent = text;
  transcriptEl.classList.add('show');
}
function hideTranscript() { transcriptEl.classList.remove('show'); }

/* ════════════════════════════
   11. FIREBASE LOGIN
════════════════════════════ */
function bootMainScreen(token, name) {
  document.getElementById('login-screen').classList.add('hide');
  document.getElementById('main-screen').classList.add('show');
  // ▸ Show chat toggle button after login
  document.getElementById('chat-toggle').classList.add('visible');
  EmotionEngine.set('idle');
  BlinkEngine.start();
  IdleEngine.start();
  PassiveSystem.start();
  WSEngine.init(token);
  setTimeout(() => {
    const greeting = name ? `Hey ${name}, I'm awake!` : "Hey, I'm awake!";
    IslandEngine.notify('👋', greeting, 'happy');
    const spokenGreeting = name ? `Hey ${name}! Tap me anytime.` : "Hey! Tap me anytime.";
    setTimeout(() => TTSEngine.speak(spokenGreeting, 'happy'), 800);
  }, 800);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  if (!email || !pass) { errEl.textContent = 'Enter email and password.'; return; }
  errEl.textContent = '';
  try {
    await fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const cred  = await fbAuth.signInWithEmailAndPassword(email, pass);
    const token = await cred.user.getIdToken();
    const name  = cred.user.displayName ? cred.user.displayName.split(' ')[0] : '';
    bootMainScreen(token, name);
  } catch(err) {
    const msgs = {
      'auth/invalid-credential': 'Wrong email or password.',
      'auth/user-not-found':     'No account found.',
      'auth/wrong-password':     'Wrong password.',
      'auth/invalid-email':      'Invalid email format.',
      'auth/too-many-requests':  'Too many attempts — try later.',
    };
    document.getElementById('login-error').textContent = msgs[err.code] || 'Login failed. Try again.';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

fbAuth.onAuthStateChanged(async (user) => {
  if (user) {
    const token = await user.getIdToken();
    const name  = user.displayName ? user.displayName.split(' ')[0] : '';
    bootMainScreen(token, name);
  }
});

/* ════════════════════════════
   12. TAP TO SPEAK
════════════════════════════ */
document.getElementById('scene').addEventListener('click', () => {
  PassiveSystem.onInteract();
  if (['speaking', 'thinking', 'dozing'].includes(EmotionEngine.get())) return;
  if (document.body.getAttribute('data-speaking') === 'true') return;
  VoiceEngine.start();
});
</script>
