<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Rexy</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --face:    #ffffff;
      --eye-w:   90px;
      --eye-h:   110px;
      --eye-gap: 80px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      touch-action: none;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      color: #fff;
    }

    /* ════════════════════════════════
       LOGIN SCREEN
    ════════════════════════════════ */
    #login-screen {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 600ms ease, transform 600ms cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #login-screen.hide { opacity: 0; pointer-events: none; transform: scale(0.96); }

    .login-face { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 36px; animation: breathe 4s ease-in-out infinite; }
    .login-eyes { display: flex; gap: 22px; }
    .login-eye  { width: 28px; height: 34px; background: #fff; border-radius: 12px; }
    .login-mouth{ width: 20px; height: 5px; background: #fff; border-radius: 5px; }

    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: #444; margin-bottom: 36px; }

    .login-form { display: flex; flex-direction: column; gap: 12px; width: 300px; }
    .login-form input {
      background: #111; border: 1px solid #222; border-radius: 14px;
      padding: 14px 18px; font-size: 15px; color: #fff; outline: none;
      transition: border-color 200ms;
      -webkit-appearance: none; appearance: none;
    }
    .login-form input:focus { border-color: #444; }
    .login-form input::placeholder { color: #333; }

    .login-btn {
      background: #fff; color: #000; border: none; border-radius: 14px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
      transition: transform 100ms;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; appearance: none;
    }
    .login-btn:active { transform: scale(0.97); }
    #login-error { font-size: 12px; color: #ff4444; text-align: center; min-height: 18px; margin-top: 4px; }

    /* ════════════════════════════════
       MAIN SCREEN
    ════════════════════════════════ */
    #main-screen { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 800ms ease; }
    #main-screen.show { opacity: 1; pointer-events: all; }

    #scene {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Face ── */
    #face {
      display: flex; flex-direction: column; align-items: center; gap: 36px;
      animation: breathe 4s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);     }
      50%       { transform: scale(1.018);}
    }

    #face.look-up {
      animation: none;
      transform: translateY(-18px) !important;
      transition: transform 500ms cubic-bezier(0.34, 1.3, 0.64, 1) !important;
    }

    /* ── Eyes ── */
    #eyes { display: flex; align-items: center; gap: var(--eye-gap); }

    .eye {
      width:  var(--eye-w);
      height: var(--eye-h);
      background: var(--face);
      border-radius: 42px;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity       200ms ease;
      will-change: transform, height, border-radius;
      transform-origin: center center;
    }

    .eye.blink       { transform: scaleY(0.05) !important; transition: transform 80ms  ease-in  !important; }
    .eye.blink-open  { transform: scaleY(1)    !important; transition: transform 100ms ease-out !important; }
    .eye.glance-left  { transform: translateX(-12px); }
    .eye.glance-right { transform: translateX(12px);  }
    .eye.look-up      { transform: translateY(-10px) !important; }

    /* ── EYE EMOTIONS (independent of mouth/speaking) ── */
    body[data-emotion="idle"]      .eye { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="listening"] .eye { width: 80px; height: 130px; border-radius: 50px; }
    body[data-emotion="happy"]     .eye { width: 100px; height: 72px; border-radius: 80px 80px 8px 8px; }
    body[data-emotion="sad"]       .eye { width: 78px; height: 118px; border-radius: 44px 44px 28px 28px / 60px 60px 30px 30px; }
    body[data-emotion="sad"]     #eye-r { transform: rotate(4deg); }
    body[data-emotion="sad"]     #eye-l { transform: rotate(-4deg); }
    body[data-emotion="thinking"] #eye-l { width: var(--eye-w); height: 44px; border-radius: 28px; }
    body[data-emotion="thinking"] #eye-r { width: var(--eye-w); height: var(--eye-h); border-radius: 42px; }
    body[data-emotion="surprised"] .eye  { width: 100px; height: 148px; border-radius: 60px; }

    /* ── MOUTH — base states ── */
    #mouth {
      width: 64px; height: 14px;
      background: var(--face);
      border-radius: 12px;
      transition:
        width         400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        height        400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        border-radius 400ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform     400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body[data-emotion="idle"]      #mouth { width: 64px;  height: 14px; border-radius: 12px; transform: none; }
    body[data-emotion="happy"]     #mouth { width: 96px;  height: 20px; border-radius: 0 0 60px 60px / 0 0 28px 28px; }
    body[data-emotion="sad"]       #mouth { width: 80px;  height: 20px; border-radius: 60px 60px 0 0 / 28px 28px 0 0; }
    body[data-emotion="thinking"]  #mouth { width: 20px;  height: 20px; border-radius: 50%; transform: translateX(12px); }
    body[data-emotion="listening"] #mouth { width: 40px;  height: 22px; border-radius: 50%; }
    body[data-emotion="surprised"] #mouth { width: 52px;  height: 52px; border-radius: 50%; }

    /* ── SPEAKING OVERLAY — mouth pulses regardless of eye emotion ── */
    body[data-speaking="true"] #mouth {
      width: 56px !important;
      height: 28px !important;
      border-radius: 50% !important;
      transform: none !important;
      animation: speak-pulse 0.4s ease-in-out infinite alternate !important;
      transition: none !important;
    }

    @keyframes speak-pulse {
      from { height: 18px; }
      to   { height: 40px; }
    }

    /* ── Mic ring ── */
    #mic-ring {
      position: fixed; inset: 0;
      border: 2px solid rgba(255,255,255,0);
      pointer-events: none; z-index: 10;
      transition: border-color 400ms ease;
    }
    #mic-ring.active {
      border-color: rgba(255,255,255,0.08);
      animation: ring-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { border-color: rgba(255,255,255,0.05); }
      50%       { border-color: rgba(255,255,255,0.14); }
    }

    /* ── Status ── */
    #status {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: #2a2a2a; letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 300ms; pointer-events: none; white-space: nowrap; z-index: 20;
    }
    #status.visible { color: #3a3a3a; }

    /* ── Transcript ── */
    #transcript-bubble {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #111; border: 1px solid #222; border-radius: 18px;
      padding: 10px 18px; font-size: 13px; color: #888; max-width: 280px;
      text-align: center; opacity: 0; transition: opacity 300ms;
      pointer-events: none; z-index: 20; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    #transcript-bubble.show { opacity: 1; }

    /* ════════════════════════════════
       NOTIFICATION ISLAND
    ════════════════════════════════ */
    #island-wrap {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
    }

    #island {
      background: #ffffff; border-radius: 999px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      width: 10px; height: 10px; opacity: 0;
      transition: width 280ms cubic-bezier(0.34,1.3,0.64,1), height 280ms cubic-bezier(0.34,1.3,0.64,1), opacity 180ms ease;
      will-change: width, height, opacity;
    }

    #island.dot      { width: 10px;  height: 10px;  opacity: 1; }
    #island.expanded { width: 260px; height: 44px;  opacity: 1; }
    #island.gone     { width: 10px;  height: 10px;  opacity: 0; }

    #island-content {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 0 18px; width: 100%;
      opacity: 0; transform: scale(0.88);
      transition: opacity 180ms ease 100ms, transform 240ms cubic-bezier(0.34,1.56,0.64,1) 100ms;
      pointer-events: none;
    }
    #island.expanded #island-content { opacity: 1; transform: scale(1); }
    #island-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
    #island-text { font-size: 13.5px; font-weight: 600; letter-spacing: -0.015em; color: #000; white-space: nowrap; }

    /* ── Vignette ── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, #000 100%);
      pointer-events: none; z-index: 50;
    }
  </style>
</head>

<body data-emotion="idle" data-speaking="false">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-face">
    <div class="login-eyes"><div class="login-eye"></div><div class="login-eye"></div></div>
    <div class="login-mouth"></div>
  </div>
  <div class="login-title">Hey, I'm Rexy.</div>
  <div class="login-sub">Sign in to wake me up.</div>
  <div class="login-form">
    <input type="email"    id="login-email" placeholder="Email"    autocomplete="email"/>
    <input type="password" id="login-pass"  placeholder="Password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div id="vignette"></div>
  <div id="mic-ring"></div>

  <div id="island-wrap">
    <div id="island" class="gone">
      <div id="island-content">
        <span id="island-icon"></span>
        <span id="island-text"></span>
      </div>
    </div>
  </div>

  <div id="scene">
    <div id="face">
      <div id="eyes">
        <div class="eye" id="eye-l"></div>
        <div class="eye" id="eye-r"></div>
      </div>
      <div id="mouth"></div>
    </div>
  </div>

  <div id="status">tap to speak</div>
  <div id="transcript-bubble"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   REXY DESK BUDDY — Phase 3
   Firebase | WebSocket | Voice | TTS | Emotion Timing
═══════════════════════════════════════════════════ */

const FIREBASE_CONFIG = {
  apiKey:     "AIzaSyBJfildiIOb3PeUNDdPaiic2ZoBl_0qg5E",
  authDomain: "rexyassistant.firebaseapp.com",
  projectId:  "rexyassistant"
};
const RAILWAY_WS = "wss://web-production-1c2c75.up.railway.app/ws";

firebase.initializeApp(FIREBASE_CONFIG);
const fbAuth = firebase.auth();

const eyeL         = document.getElementById('eye-l');
const eyeR         = document.getElementById('eye-r');
const face         = document.getElementById('face');
const statusEl     = document.getElementById('status');
const transcriptEl = document.getElementById('transcript-bubble');
const micRing      = document.getElementById('mic-ring');

/* ════════════════════════════
   1. EMOTION ENGINE
════════════════════════════ */
const EmotionEngine = (() => {
  let current     = 'idle';
  let returnTimer = null;

  function set(emotion, duration = null) {
    current = emotion;
    document.body.setAttribute('data-emotion', emotion);
    if (returnTimer) clearTimeout(returnTimer);
    if (duration) returnTimer = setTimeout(() => set('idle'), duration);
  }

  // Speaking overlay — animates mouth without touching eye emotion
  function setSpeaking(active) {
    document.body.setAttribute('data-speaking', active ? 'true' : 'false');
  }

  function get() { return current; }
  return { set, get, setSpeaking };
})();

/* ════════════════════════════
   2. BLINK ENGINE
════════════════════════════ */
const BlinkEngine = (() => {
  function blink() {
    if (['sad','surprised'].includes(EmotionEngine.get())) { schedule(); return; }
    // Don't blink while speaking
    if (document.body.getAttribute('data-speaking') === 'true') { schedule(); return; }

    eyeL.classList.add('blink'); eyeR.classList.add('blink');
    setTimeout(() => {
      eyeL.classList.remove('blink'); eyeR.classList.remove('blink');
      eyeL.classList.add('blink-open'); eyeR.classList.add('blink-open');
      setTimeout(() => {
        eyeL.classList.remove('blink-open'); eyeR.classList.remove('blink-open');
        schedule();
      }, 120);
    }, 100);
  }
  function schedule() { setTimeout(blink, 4000 + Math.random() * 5000); }
  function start()    { schedule(); }
  return { start };
})();

/* ════════════════════════════
   3. IDLE ENGINE
════════════════════════════ */
const IdleEngine = (() => {
  function glance() {
    if (EmotionEngine.get() !== 'idle') { scheduleGlance(); return; }
    const dir = Math.random() < 0.5 ? 'glance-left' : 'glance-right';
    eyeL.classList.add(dir); eyeR.classList.add(dir);
    setTimeout(() => {
      eyeL.classList.remove(dir); eyeR.classList.remove(dir);
      scheduleGlance();
    }, 700 + Math.random() * 700);
  }
  function scheduleGlance() { setTimeout(glance, 5000 + Math.random() * 8000); }

  function drift() {
    if (EmotionEngine.get() !== 'idle') { face.style.transform = ''; scheduleDrift(); return; }
    face.style.transition = 'transform 3s ease-in-out';
    face.style.transform  = `translate(${(Math.random()-0.5)*6}px,${(Math.random()-0.5)*4}px)`;
    scheduleDrift();
  }
  function scheduleDrift() { setTimeout(drift, 3000 + Math.random() * 4000); }

  function start() { scheduleGlance(); scheduleDrift(); }
  return { start };
})();

/* ════════════════════════════
   4. ISLAND ENGINE
════════════════════════════ */
const IslandEngine = (() => {
  const island = document.getElementById('island');
  const iconEl = document.getElementById('island-icon');
  const textEl = document.getElementById('island-text');

  let queue = [];
  let busy  = false;

  function enqueue(icon, text, emotion) {
    queue.push({ icon, text, emotion });
    if (!busy) processNext();
  }

  function processNext() {
    if (!queue.length) { busy = false; return; }
    busy = true;
    run(queue.shift());
  }

  function run({ icon, text, emotion }) {
    eyeL.classList.add('look-up');
    eyeR.classList.add('look-up');
    face.classList.add('look-up');

    iconEl.textContent = icon;
    textEl.textContent = text;
    island.className = 'dot';

    setTimeout(() => {
      island.className = 'expanded';
      // Set eye emotion when island expands
      setTimeout(() => EmotionEngine.set(emotion), 300);
      // Collapse island — emotion STAYS, TTS will hold it
      setTimeout(collapse, 2600);
    }, 200);
  }

  function collapse() {
    island.className = 'dot';
    setTimeout(() => {
      eyeL.classList.remove('look-up');
      eyeR.classList.remove('look-up');
      face.classList.remove('look-up');
      // ← No EmotionEngine.set('idle') here — TTS handles the reset
    }, 180);
    setTimeout(() => {
      island.className = 'gone';
      setTimeout(processNext, 150);
    }, 340);
  }

  return { notify: enqueue };
})();

/* ════════════════════════════
   5. TTS ENGINE
════════════════════════════ */
const TTSEngine = (() => {
  function speak(text, emotion = 'idle') {
    if (!text) return;
    window.speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.rate   = 1.05;
    utt.pitch  = 1.1;
    utt.volume = 1;

    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
      v.name.includes('Google') || v.name.includes('Samantha') || v.lang === 'en-US'
    );
    if (preferred) utt.voice = preferred;

    utt.onstart = () => {
      // Eyes show the response emotion, mouth pulses
      EmotionEngine.set(emotion);
      EmotionEngine.setSpeaking(true);
      setStatus('speaking…');
    };

    utt.onend = () => {
      // Speech done → clear speaking mouth, return to idle
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    utt.onerror = () => {
      EmotionEngine.setSpeaking(false);
      EmotionEngine.set('idle');
      setStatus('tap to speak');
    };

    window.speechSynthesis.speak(utt);
  }

  return { speak };
})();

/* ════════════════════════════
   6. WEBSOCKET ENGINE
════════════════════════════ */
const WSEngine = (() => {
  let ws        = null;
  let authToken = null;

  // Map backend emotion values → face emotion states
  const EMOTION_MAP = {
    'neutral':  'idle',
    'positive': 'happy',
    'negative': 'sad',
    'curious':  'thinking',
    'error':    'sad',
    // pass-through values
    'happy':    'happy',
    'sad':      'sad',
    'thinking': 'thinking',
    'surprised':'surprised',
    'listening':'listening',
  };

  // Map intent → default emotion (fallback if plugin returns neutral)
  const INTENT_EMOTIONS = {
    'CHAT':        'happy',
    'WEATHER':     'happy',
    'CALENDAR':    'happy',
    'MEMORY':      'happy',
    'WEB_SEARCH':  'thinking',
    'COMPUTER':    'happy',
    'SYSTEM_INFO': 'happy',
    'FILE_READ':   'thinking',
    'CALCULATOR':  'happy',
    'TIME':        'happy',
  };

  function init(token) {
    authToken = token;
    connect();
  }

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(RAILWAY_WS);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'auth', token: authToken }));
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleResponse(data);
      } catch(e) { console.error('WS parse error:', e); }
    };

    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = (e) => console.error('WS error:', e);
  }

  function send(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      IslandEngine.notify('⚠️', 'Not connected', 'sad');
      return;
    }
    ws.send(JSON.stringify({ message: text }));
  }

  function handleResponse(data) {
    let reply      = '';
    let emotion    = 'happy';
    let notifText  = '';
    let notifIcon  = '💬';
    let intent     = '';

    if (typeof data === 'string') {
      reply = data;
    } else {
      reply     = data.reply      || data.message || data.response || '';
      emotion   = data.emotion    || 'happy';
      notifText = data.notification || '';
      notifIcon = data.icon        || '💬';
      intent    = data.intent      || '';
    }

    if (!reply) return;

    // Resolve final face emotion:
    // 1. Use mapped emotion from backend
    // 2. Fall back to intent-based emotion
    // 3. Default happy
    let faceEmotion = EMOTION_MAP[emotion] || emotion;
    if (faceEmotion === 'idle' || faceEmotion === 'neutral') {
      faceEmotion = INTENT_EMOTIONS[intent] || 'happy';
    }

    // Pick notification icon based on intent if not provided
    if (notifIcon === '💬') {
      const intentIcons = {
        'WEATHER':     '🌤',
        'CALENDAR':    '📅',
        'MEMORY':      '💾',
        'WEB_SEARCH':  '🔍',
        'COMPUTER':    '💻',
        'SYSTEM_INFO': '🖥',
        'FILE_READ':   '📄',
        'CALCULATOR':  '🧮',
        'TIME':        '🕐',
      };
      notifIcon = intentIcons[intent] || '💬';
    }

    const displayText = notifText || (reply.length > 32 ? reply.slice(0, 30) + '…' : reply);
    IslandEngine.notify(notifIcon, displayText, faceEmotion);

    // Pass emotion to TTS — it holds until speech finishes
    setTimeout(() => TTSEngine.speak(reply, faceEmotion), 600);
  }

  return { init, send };
})();

/* ════════════════════════════
   7. VOICE ENGINE
════════════════════════════ */
const VoiceEngine = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('SpeechRecognition not supported'); return { start: () => {} }; }

  let recognition = null;
  let listening   = false;

  function build() {
    recognition = new SR();
    recognition.lang           = 'en-US';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.continuous     = false;

    recognition.onstart = () => {
      listening = true;
      EmotionEngine.set('listening');
      micRing.classList.add('active');
      setStatus('listening…');
      showTranscript('');
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t) : (interim += t);
      }
      showTranscript(final || interim);
      if (final) onFinal(final.trim());
    };

    recognition.onerror = (e) => {
      console.error('SR error:', e.error);
      stopListening();
      if (e.error === 'no-speech') IslandEngine.notify('👂', 'Nothing heard — try again', 'sad');
    };

    recognition.onend = () => {
      listening = false;
      micRing.classList.remove('active');
    };
  }

  function onFinal(text) {
    if (!text) return;
    stopListening();
    EmotionEngine.set('thinking');
    setStatus('thinking…');
    showTranscript(text);
    IslandEngine.notify('🔍', text.length > 28 ? text.slice(0, 26) + '…' : text, 'thinking');
    setTimeout(() => WSEngine.send(text), 300);
    setTimeout(() => hideTranscript(), 3000);
  }

  function start() {
    if (listening) { stop(); return; }
    build();
    try { recognition.start(); }
    catch(e) { console.error('SR start failed:', e); }
  }

  function stop() {
    if (recognition) recognition.stop();
    stopListening();
  }

  function stopListening() {
    listening = false;
    micRing.classList.remove('active');
    setStatus('tap to speak');
  }

  return { start, stop };
})();

/* ════════════════════════════
   8. UI HELPERS
════════════════════════════ */
function setStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.toggle('visible', text !== 'tap to speak');
}
function showTranscript(text) {
  if (!text) return;
  transcriptEl.textContent = text;
  transcriptEl.classList.add('show');
}
function hideTranscript() { transcriptEl.classList.remove('show'); }

/* ════════════════════════════
   9. FIREBASE LOGIN
════════════════════════════ */
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  if (!email || !pass) { errEl.textContent = 'Enter email and password.'; return; }
  errEl.textContent = '';

  try {
    await fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const cred  = await fbAuth.signInWithEmailAndPassword(email, pass);
    const token = await cred.user.getIdToken();

    document.getElementById('login-screen').classList.add('hide');
    document.getElementById('main-screen').classList.add('show');

    EmotionEngine.set('idle');
    BlinkEngine.start();
    IdleEngine.start();
    WSEngine.init(token);

    setTimeout(() => {
      const name = cred.user.displayName ? cred.user.displayName.split(' ')[0] : 'there';
      IslandEngine.notify('👋', `Hey ${name}, I'm awake!`, 'happy');
      setTimeout(() => TTSEngine.speak(`Hey ${name}! Tap me anytime.`, 'happy'), 800);
    }, 800);

  } catch(err) {
    const msgs = {
      'auth/invalid-credential': 'Wrong email or password.',
      'auth/user-not-found':     'No account found.',
      'auth/wrong-password':     'Wrong password.',
      'auth/invalid-email':      'Invalid email format.',
      'auth/too-many-requests':  'Too many attempts — try later.',
    };
    errEl.textContent = msgs[err.code] || 'Login failed. Try again.';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* ════════════════════════════
   10. TAP TO SPEAK
════════════════════════════ */
document.getElementById('scene').addEventListener('click', () => {
  if (['speaking', 'thinking'].includes(EmotionEngine.get())) return;
  if (document.body.getAttribute('data-speaking') === 'true') return;
  VoiceEngine.start();
});

fbAuth.onAuthStateChanged(async (user) => {
  if (user) {
    const token = await user.getIdToken();
    document.getElementById('login-screen').classList.add('hide');
    document.getElementById('main-screen').classList.add('show');
    EmotionEngine.set('idle');
    BlinkEngine.start();
    IdleEngine.start();
    WSEngine.init(token);
    setTimeout(() => {
      IslandEngine.notify('👋', "Hey, I'm awake!", 'happy');
    }, 800);
  }
});
</script>
