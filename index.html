<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:         #060608;
  --cyan:       #00e5ff;
  --cyan-dim:   #0099bb;
  --cyan-glow:  rgba(0, 229, 255, 0.12);
  --cyan-soft:  rgba(0, 229, 255, 0.06);
  --violet:     #6d28d9;
  --violet-dim: rgba(109, 40, 217, 0.3);
  --white:      #f0f0f8;
  --dim:        #4a4a6a;
  --dim2:       #2a2a3e;
  --surface:    rgba(12, 12, 20, 0.85);
  --border:     rgba(255, 255, 255, 0.06);
  --border2:    rgba(0, 229, 255, 0.1);
  --green:      #10b981;
  --rexy-bg:    rgba(0, 229, 255, 0.04);
  --user-bg:    rgba(109, 40, 217, 0.18);
}

html, body {
  width: 100%; height: 100%; min-height: 100vh;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  cursor: default;
}

/* ── Deep space background ── */
#bg-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Ambient radial behind robot ── */
#ambient {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(0, 229, 255, 0.04) 0%,
    rgba(0, 100, 150, 0.03) 40%,
    transparent 70%
  );
  pointer-events: none;
  z-index: 0;
  animation: ambient-breathe 4s ease-in-out infinite;
}

@keyframes ambient-breathe {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
}

/* ── App layout ── */
#app {
  position: relative;
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-rows: 52px 1fr auto auto;
  z-index: 1;
}

/* ── Topbar ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(6, 6, 8, 0.7);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

#logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
  animation: logo-glow 3s ease-in-out infinite;
}

@keyframes logo-glow {
  0%, 100% { text-shadow: 0 0 20px rgba(0,229,255,0.4); }
  50%       { text-shadow: 0 0 35px rgba(0,229,255,0.7), 0 0 60px rgba(0,229,255,0.2); }
}

#topbar-center {
  display: flex;
  align-items: center;
  gap: 8px;
}

#status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 16px rgba(16,185,129,0.3);
  animation: status-pulse 2s infinite;
}

@keyframes status-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50%       { opacity: 0.5; box-shadow: 0 0 4px var(--green); }
}

#status-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
}

#plugin-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--cyan);
  padding: 3px 10px;
  border: 1px solid var(--border2);
  border-radius: 20px;
  background: var(--cyan-soft);
  opacity: 0;
  transform: translateY(-6px) scale(0.95);
  transition: opacity 0.3s cubic-bezier(0.34,1.56,0.64,1),
              transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}

#plugin-badge.visible { opacity: 1; transform: translateY(0) scale(1); }

#shortcut-hint {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim2);
}

#shortcut-hint kbd {
  background: var(--dim2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 9px;
  color: var(--dim);
}

/* ── Robot stage ── */
#robot-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
}

#robotCanvas {
  width: 280px;
  height: 350px;
  display: block;
  filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.08));
  transition: filter 0.5s ease;
}

#robotCanvas.thinking-state {
  filter: drop-shadow(0 0 40px rgba(0, 229, 255, 0.18));
}

/* Floor glow under robot */
#floor-glow {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  box-shadow: 0 0 20px 8px rgba(0, 229, 255, 0.06);
}

/* ── Chat panel ── */
#chat-panel {
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 20px;
  max-height: 240px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: none;
}

#chat-panel::-webkit-scrollbar { display: none; }

/* Welcome state */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 20px;
  opacity: 0;
  animation: welcome-in 1s 0.5s ease forwards;
}

@keyframes welcome-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 0.3; transform: translateY(0); }
}

#welcome-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--cyan);
}

#welcome-sub {
  font-size: 12px;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
}

/* Message rows */
.msg-row {
  display: flex;
  flex-direction: column;
  animation: msg-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes msg-pop {
  from { opacity: 0; transform: translateY(16px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row.user { align-items: flex-end; }
.msg-row.rexy { align-items: flex-start; }

.msg-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  margin-bottom: 3px;
  padding: 0 6px;
  letter-spacing: 0.5px;
}

.bubble {
  max-width: 72%;
  padding: 10px 15px;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.65;
  word-break: break-word;
  border-radius: 16px;
}

.msg-row.user .bubble {
  background: var(--user-bg);
  border: 1px solid rgba(109,40,217,0.25);
  border-bottom-right-radius: 3px;
  color: var(--white);
  backdrop-filter: blur(10px);
}

.msg-row.rexy .bubble {
  background: var(--rexy-bg);
  border: 1px solid var(--border2);
  border-bottom-left-radius: 3px;
  color: var(--white);
  backdrop-filter: blur(10px);
}

/* Thinking row */
#thinking-row {
  display: flex;
  align-items: flex-start;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
}

#thinking-row.visible { opacity: 1; transform: translateY(0); }

#thinking-bubble {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  background: var(--rexy-bg);
  border: 1px solid var(--border2);
  border-radius: 16px;
  border-bottom-left-radius: 3px;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cyan);
  opacity: 0.3;
  animation: dot-wave 1.4s infinite ease-in-out;
}
.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes dot-wave {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── Input zone ── */
#input-zone {
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 12px 20px 24px;
}

/* Divider above input */
#input-zone::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin-bottom: 14px;
  opacity: 0.6;
}

#input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(10, 10, 18, 0.9);
  border: 1px solid var(--border);
  border-radius: 32px;
  padding: 6px 6px 6px 22px;
  backdrop-filter: blur(20px);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

#input-bar::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 32px;
  background: linear-gradient(135deg, transparent 40%, rgba(0,229,255,0.05) 100%);
  pointer-events: none;
}

#input-bar:focus-within {
  border-color: rgba(0, 229, 255, 0.25);
  box-shadow:
    0 0 0 4px rgba(0, 229, 255, 0.04),
    0 0 40px rgba(0, 229, 255, 0.06),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

#message-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.2px;
}

#message-input::placeholder {
  color: var(--dim);
  font-weight: 300;
}

#btn-sparkle {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--dim2);
  border: 1px solid var(--border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

#btn-sparkle:hover {
  background: rgba(0,229,255,0.08);
  border-color: var(--border2);
  transform: scale(1.05) rotate(15deg);
}

#btn-ask {
  height: 38px;
  padding: 0 22px;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dim) 100%);
  color: #000;
  border: none;
  border-radius: 24px;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

#btn-ask::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  border-radius: 24px;
}

#btn-ask:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0, 229, 255, 0.35), 0 0 40px rgba(0, 229, 255, 0.15);
}

#btn-ask:active { transform: scale(0.97) translateY(0); }

/* ── Emotion chips ── */
#emotion-strip {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
}

.chip {
  background: transparent;
  border: 1px solid var(--dim2);
  color: var(--dim);
  padding: 4px 12px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.chip:hover {
  border-color: rgba(0,229,255,0.2);
  color: rgba(0,229,255,0.6);
}

.chip.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-soft);
  box-shadow: 0 0 12px rgba(0, 229, 255, 0.1), inset 0 0 8px rgba(0, 229, 255, 0.04);
}

/* ── Flash animation for shortcut ── */
@keyframes input-flash {
  0%   { border-color: rgba(0,229,255,0.6); box-shadow: 0 0 0 4px rgba(0,229,255,0.12); }
  100% { border-color: rgba(0,229,255,0.25); box-shadow: 0 0 0 4px rgba(0,229,255,0.04); }
}

#input-bar.flash {
  animation: input-flash 0.5s ease-out forwards;
}

/* ── Particle canvas ── */
#particle-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}
</style>
</head>
<body>

<!-- Layers -->
<canvas id="particle-canvas"></canvas>
<div id="ambient"></div>

<div id="app">

  <!-- Topbar -->
  <div id="topbar">
    <span id="logo">REXY</span>
    <div id="topbar-center">
      <div id="status-dot"></div>
      <span id="status-text">ONLINE</span>
    </div>
    <div id="plugin-badge">PLUGIN</div>
    <div id="shortcut-hint">press <kbd>/</kbd> to focus</div>
  </div>

  <!-- Robot stage -->
  <div id="robot-stage">
    <canvas id="robotCanvas" width="400" height="500"></canvas>
    <div id="floor-glow"></div>
  </div>

  <!-- Chat panel -->
  <div id="chat-panel">
    <div id="welcome">
      <div id="welcome-title">REXY · v4.0</div>
      <div id="welcome-sub">say something_</div>
    </div>
    <div id="thinking-row">
      <div id="thinking-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-zone">
    <div id="input-bar">
      <input id="message-input" placeholder="Talk to Rexy..." autocomplete="off" spellcheck="false" />
      <button id="btn-sparkle" onclick="inspireMe()" title="Inspire me">✨</button>
      <button id="btn-ask" onclick="handleChat()">ASK</button>
    </div>
    <div id="emotion-strip">
      <button class="chip" onclick="setMood('neutral')"  id="neutral-btn">NEUTRAL</button>
      <button class="chip" onclick="setMood('happy')"    id="happy-btn">HAPPY</button>
      <button class="chip" onclick="setMood('thinking')" id="thinking-btn">THINKING</button>
      <button class="chip" onclick="setMood('sad')"      id="sad-btn">SAD</button>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════
// PARTICLE SYSTEM — floating space dust
// ════════════════════════════════════════════════════
const pCanvas = document.getElementById('particle-canvas');
const pCtx    = pCanvas.getContext('2d');

pCanvas.width  = window.innerWidth;
pCanvas.height = window.innerHeight;

const particles = Array.from({ length: 60 }, () => ({
  x:     Math.random() * pCanvas.width,
  y:     Math.random() * pCanvas.height,
  r:     Math.random() * 1.2 + 0.2,
  vx:    (Math.random() - 0.5) * 0.15,
  vy:    (Math.random() - 0.5) * 0.15,
  alpha: Math.random() * 0.4 + 0.05,
  pulse: Math.random() * Math.PI * 2
}));

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles.forEach(p => {
    p.x     += p.vx;
    p.y     += p.vy;
    p.pulse += 0.01;
    const a  = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
    if (p.x < 0) p.x = pCanvas.width;
    if (p.x > pCanvas.width)  p.x = 0;
    if (p.y < 0) p.y = pCanvas.height;
    if (p.y > pCanvas.height) p.y = 0;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(0, 229, 255, ${a})`;
    pCtx.fill();
  });
  requestAnimationFrame(animateParticles);
}

animateParticles();

window.addEventListener('resize', () => {
  pCanvas.width  = window.innerWidth;
  pCanvas.height = window.innerHeight;
});

// ════════════════════════════════════════════════════
// ROBOT — original white robot, 100% preserved
// ════════════════════════════════════════════════════
const canvas = document.getElementById('robotCanvas');
const ctx    = canvas.getContext('2d');

const robot = {
  x: 0, y: 0, baseY: 0, floatOffset: 0, time: 0,
  eyes: {
    left:  { x: -35, y: -10, targetX: -35, targetY: -10 },
    right: { x:  35, y: -10, targetX:  35, targetY: -10 },
    blinkOpen: 1, nextBlinkTime: 0, width: 15, height: 22
  },
  mood: 'neutral'
};

let uiState = 'idle', stateTime = 0, stateTransition = 0;
let isThinking = false;

const STATES = {
  idle:       { floatAmp: 12, floatSpeed: 0.3,  eyeDrift: 8,  glowRadius: 25, shadowBlur: 20 },
  listening:  { floatAmp:  5, floatSpeed: 0.2,  eyeDrift: 2,  glowRadius: 18, shadowBlur: 12 },
  thinking:   { floatAmp:  2, floatSpeed: 0.1,  eyeDrift: 0,  glowRadius: 22, shadowBlur: 15 },
  responding: { floatAmp:  8, floatSpeed: 0.8,  eyeDrift: 3,  glowRadius: 28, shadowBlur: 18 }
};

const COLOR_PALETTE = {
  bodyLight:  '#ffffff',
  bodyMid:    '#f0f5fa',
  bodyShadow: '#dbe4eb',
  visorDark:  '#181b26',
  visorLight: '#2a3040',
  eyeGlow:    'rgba(0, 245, 255, 0.5)',
  eyeCore:    '#00f5ff'
};

function resize() {
  canvas.width  = 400;
  canvas.height = 500;
  robot.x       = canvas.width  / 2;
  robot.baseY   = canvas.height / 2;
}
window.addEventListener('resize', resize);
resize();

function easeInOutSine(x) { return -(Math.cos(Math.PI * x) - 1) / 2; }

function drawRoundedRect(ctx, x, y, w, h, r) {
  if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);     ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawShadow() {
  const floatPhase   = Math.sin(robot.time);
  const baseWidth    = 110;
  const shadowFactor = (floatPhase + 1) / 2;
  const currentWidth = baseWidth + shadowFactor * 25;
  const currentBlur  = 15 + shadowFactor * 15;
  const currentAlpha = 0.15 - shadowFactor * 0.05;
  const shadowY      = robot.baseY + 140;
  const state        = STATES[uiState];
  ctx.shadowBlur     = state.shadowBlur + Math.sin(stateTime * 0.2) * 3;
  ctx.save();
  ctx.translate(robot.x, shadowY);
  ctx.scale(1, 0.3);
  const g = ctx.createRadialGradient(0,0,0,0,0,currentWidth);
  g.addColorStop(0,   `rgba(0,40,80,${currentAlpha})`);
  g.addColorStop(0.5, `rgba(0,40,80,${currentAlpha*0.5})`);
  g.addColorStop(1,   `rgba(0,40,80,0)`);
  ctx.fillStyle = g;
  ctx.shadowBlur  = currentBlur;
  ctx.shadowColor = "rgba(0,0,0,0.1)";
  ctx.beginPath();
  ctx.arc(0,0,currentWidth,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawArms() {
  const bodyY = robot.y + 55;
  ctx.save();
  ctx.translate(robot.x, bodyY);
  const ag = ctx.createLinearGradient(0,-20,0,40);
  ag.addColorStop(0, COLOR_PALETTE.bodyLight);
  ag.addColorStop(1, COLOR_PALETTE.bodyShadow);
  ctx.fillStyle = ag;
  drawSingleArm(-1); drawSingleArm(1);
  ctx.restore();
}

function drawSingleArm(side) {
  const startX=35*side,startY=-15,endX=65*side,endY=25,sw=18,ww=10;
  ctx.beginPath();
  ctx.moveTo(startX,startY-sw/2);
  ctx.lineTo(endX,endY-ww/2);
  ctx.arc(endX,endY,8,-Math.PI/2,Math.PI/2,false);
  ctx.arc(endX,endY,8,Math.PI/2,-Math.PI/2,false);
  ctx.lineTo(endX,endY+ww/2);
  ctx.lineTo(startX,startY+sw/2);
  ctx.fill();
  ctx.shadowColor="rgba(0,0,0,0.05)"; ctx.shadowBlur=4; ctx.stroke();
  ctx.shadowColor="transparent";
}

function drawBody() {
  const bodyY=robot.y+55;
  ctx.save();
  ctx.translate(robot.x,bodyY);
  const g=ctx.createRadialGradient(-30,-40,10,0,0,80);
  g.addColorStop(0,'#ffffff'); g.addColorStop(0.3,COLOR_PALETTE.bodyMid); g.addColorStop(1,COLOR_PALETTE.bodyShadow);
  ctx.fillStyle=g;
  const w=84,h=55;
  ctx.beginPath();
  ctx.moveTo(-w+10,-20);
  ctx.bezierCurveTo(-w,0,-w+5,h,-30,h+10);
  ctx.quadraticCurveTo(0,h+15,30,h+10);
  ctx.bezierCurveTo(w-5,h,w,0,w-10,-20);
  ctx.fill();
  ctx.shadowColor="rgba(255,255,255,0.5)"; ctx.shadowBlur=5; ctx.shadowOffsetY=1; ctx.stroke();
  ctx.restore();
}

function drawHead() {
  ctx.save();
  ctx.translate(robot.x,robot.y);
  ctx.shadowColor="rgba(160,170,190,0.2)"; ctx.shadowBlur=30; ctx.shadowOffsetY=15;
  const hg=ctx.createRadialGradient(-50,-50,10,0,0,120);
  hg.addColorStop(0,'#ffffff'); hg.addColorStop(0.4,COLOR_PALETTE.bodyMid); hg.addColorStop(1,COLOR_PALETTE.bodyShadow);
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(0,0,105,0,Math.PI*2); ctx.fill();
  ctx.shadowColor="transparent"; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  const hl=ctx.createRadialGradient(0,-65,0,0,-65,55);
  hl.addColorStop(0,"rgba(255,255,255,0.8)"); hl.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=hl;
  ctx.beginPath(); ctx.ellipse(0,-50,65,30,0,0,Math.PI*2); ctx.fill();
  drawVisor();
  ctx.restore();
}

function drawVisor() {
  const visorW=160,visorH=100,visorY=10;
  ctx.save();
  ctx.beginPath();
  drawRoundedRect(ctx,-visorW/2,visorY-visorH/2,visorW,visorH,45);
  const vg=ctx.createLinearGradient(0,visorY-visorH/2,0,visorY+visorH/2);
  vg.addColorStop(0,COLOR_PALETTE.visorDark); vg.addColorStop(1,'#050510');
  ctx.fillStyle=vg; ctx.fill(); ctx.clip();
  ctx.shadowBlur=25; ctx.shadowColor="rgba(0,0,0,0.9)";
  ctx.shadowOffsetX=0; ctx.shadowOffsetY=5;
  ctx.beginPath(); ctx.rect(-visorW/2-20,visorY-visorH/2-20,visorW+40,visorH+40); ctx.stroke();
  ctx.shadowColor="transparent";
  const gr=ctx.createLinearGradient(0,visorY-visorH/2,0,visorY);
  gr.addColorStop(0,"rgba(255,255,255,0.08)"); gr.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=gr;
  ctx.beginPath(); ctx.ellipse(0,visorY-visorH/2+10,visorW/2-10,20,0,Math.PI,0); ctx.fill();
  robot.eyes.left.targetX=Math.max(-48,Math.min(-16,robot.eyes.left.targetX));
  robot.eyes.right.targetX=Math.max(16,Math.min(48,robot.eyes.right.targetX));
  drawEyes();
  ctx.restore();
}

function drawEyes() {
  const HLM=-42,HRM=42,HSM=75;
  robot.eyes.left.targetX=Math.max(HLM,Math.min(-20,robot.eyes.left.targetX));
  robot.eyes.right.targetX=Math.max(20,Math.min(HRM,robot.eyes.right.targetX));
  const sep=robot.eyes.right.targetX-robot.eyes.left.targetX;
  if(sep<HSM){const a=(HSM-sep)/2;robot.eyes.left.targetX-=a;robot.eyes.right.targetX+=a;}
  robot.eyes.left.x+=(robot.eyes.left.targetX-robot.eyes.left.x)*0.025;
  robot.eyes.left.y+=(robot.eyes.left.targetY-robot.eyes.left.y)*0.025;
  robot.eyes.right.x+=(robot.eyes.right.targetX-robot.eyes.right.x)*0.025;
  robot.eyes.right.y+=(robot.eyes.right.targetY-robot.eyes.right.y)*0.025;
  let eyeH=robot.eyes.height*robot.eyes.blinkOpen,eyeW=robot.eyes.width;
  if(robot.mood==='sad')eyeH*=0.8;
  else if(robot.mood==='thinking')eyeW*=0.9;
  const pulse=1+Math.sin(robot.time*4)*0.05;
  drawSingleEye(robot.eyes.left.x,robot.eyes.left.y,eyeW*pulse,eyeH,COLOR_PALETTE.eyeGlow,COLOR_PALETTE.eyeCore);
  drawSingleEye(robot.eyes.right.x,robot.eyes.right.y,eyeW*pulse,eyeH,COLOR_PALETTE.eyeGlow,COLOR_PALETTE.eyeCore);
}

function drawSingleEye(x,y,w,h,glow,core) {
  ctx.save();
  ctx.translate(x,y+10);
  ctx.shadowColor=glow;
  ctx.shadowBlur=STATES[uiState].glowRadius+Math.sin(stateTime*0.4)*3;
  ctx.fillStyle=core;
  if(robot.mood==='happy'){
    const so=x>0?-3:3;
    ctx.beginPath(); ctx.arc(so,0,w*0.9,Math.PI,0);
    ctx.lineWidth=4; ctx.strokeStyle=core; ctx.stroke();
  } else {
    ctx.beginPath(); ctx.ellipse(0,0,w,h,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.8)"; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.ellipse(0,0,w*0.4,h*0.4,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function update() {
  robot.time+=0.05; stateTime+=0.05;
  stateTransition=Math.min(1,stateTransition+0.015);
  const blend=easeInOutSine(stateTransition);
  const floatAmp=15-(10*blend*((isThinking||uiState==='listening')?1:0));
  robot.floatOffset=Math.sin(robot.time*0.4+stateTime*0.2)*floatAmp*(1+Math.sin(stateTime*0.3)*0.015);
  robot.y=robot.baseY+robot.floatOffset;
  const state=STATES[uiState];
  if(uiState==='idle'&&Math.random()<0.005){
    robot.eyes.left.targetX=-(Math.random()*state.eyeDrift);
    robot.eyes.right.targetX=(Math.random()*state.eyeDrift);
  } else if(uiState==='thinking'){
    robot.eyes.left.targetY=-20+Math.sin(stateTime)*5;
    robot.eyes.right.targetY=-20+Math.sin(stateTime)*5;
  }
  if(isThinking)uiState='thinking';
  if(uiState==='responding'&&stateTime>1.5)uiState='idle';
  if(Math.random()<0.01){
    const bX=35,gX=(Math.random()-0.5)*10,gY=(Math.random()-0.5)*6;
    robot.eyes.left.targetX=-bX+gX; robot.eyes.left.targetY=-10+gY;
    robot.eyes.right.targetX=bX+gX; robot.eyes.right.targetY=-10+gY;
  }
  const now=Date.now();
  if(now>robot.eyes.nextBlinkTime){
    robot.eyes.blinkOpen-=0.15;
    if(robot.eyes.blinkOpen<=0){
      robot.eyes.blinkOpen=0;
      setTimeout(openEyes,100);
      robot.eyes.nextBlinkTime=now+2000+Math.random()*4000;
    }
  }
  // Sync canvas filter with thinking state
  canvas.classList.toggle('thinking-state', isThinking);
}

function openEyes() {
  const iv=setInterval(()=>{
    robot.eyes.blinkOpen+=0.15;
    if(robot.eyes.blinkOpen>=1){robot.eyes.blinkOpen=1;clearInterval(iv);}
  },16);
}

function drawRobot() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  drawShadow(); drawArms(); drawBody(); drawHead();
  requestAnimationFrame(drawRobot);
}

canvas.addEventListener('mousemove',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const dx=((e.clientX-rect.left)-canvas.width/2)/(canvas.width/2);
  const dy=((e.clientY-rect.top)-canvas.height/2)/(canvas.height/2);
  robot.eyes.left.targetX=-35+(dx*10); robot.eyes.left.targetY=-10+(dy*10);
  robot.eyes.right.targetX=35+(dx*10); robot.eyes.right.targetY=-10+(dy*10);
});

// ════════════════════════════════════════════════════
// MOOD
// ════════════════════════════════════════════════════
function setMood(m) {
  robot.mood=m;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`${m}-btn`);
  if(btn)btn.classList.add('active');
  if(m==='sad'){robot.eyes.left.targetY=robot.eyes.right.targetY=0;}
  else if(m==='thinking'){robot.eyes.left.targetY=robot.eyes.right.targetY=-15;}
  else{robot.eyes.left.targetY=robot.eyes.right.targetY=-10;}
}

// ════════════════════════════════════════════════════
// CHAT
// ════════════════════════════════════════════════════
const chatPanel   = document.getElementById('chat-panel');
const thinkingRow = document.getElementById('thinking-row');
const pluginBadge = document.getElementById('plugin-badge');
const msgInput    = document.getElementById('message-input');
const welcomeEl   = document.getElementById('welcome');
const inputBar    = document.getElementById('input-bar');

let welcomeVisible=true, pluginTimer=null;

const PLUGIN_NAMES = {
  WEATHER:'🌤  WEATHER', WEB_SEARCH:'🔍  WEB SEARCH',
  MEMORY:'🧠  MEMORY',   FILE_READ:'📄  FILE READER',
  SYSTEM_INFO:'🖥  SYSTEM INFO', CALCULATOR:'🧮  CALCULATOR',
  GET_TIME:'🕐  TIME',
};

function showPlugin(name){
  pluginBadge.textContent=PLUGIN_NAMES[name]||name;
  pluginBadge.classList.add('visible');
  clearTimeout(pluginTimer);
  pluginTimer=setTimeout(()=>pluginBadge.classList.remove('visible'),3500);
}

function setThinking(active){
  isThinking=active;
  if(active){
    thinkingRow.classList.add('visible');
    chatPanel.appendChild(thinkingRow);
    chatPanel.scrollTop=chatPanel.scrollHeight;
  } else {
    thinkingRow.classList.remove('visible');
  }
}

function addMessage(sender,text){
  if(welcomeVisible){welcomeEl.style.display='none';welcomeVisible=false;}
  const row=document.createElement('div');
  row.className=`msg-row ${sender}`;
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const meta=document.createElement('div');
  meta.className='msg-meta';
  meta.textContent=sender==='user'?`you · ${time}`:`rexy · ${time}`;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.textContent=text;
  row.appendChild(meta); row.appendChild(bubble);
  chatPanel.insertBefore(row,thinkingRow);
  chatPanel.scrollTop=chatPanel.scrollHeight;
}

// WebSocket
const ws=new WebSocket('ws://localhost:8000/ws');
ws.onopen=()=>{
  document.getElementById('status-text').textContent='ONLINE';
};
ws.onclose=()=>{
  const dot=document.getElementById('status-dot');
  dot.style.background='#f43f5e'; dot.style.boxShadow='0 0 8px #f43f5e';
  document.getElementById('status-text').textContent='OFFLINE';
};

let msgCooldown=0;
ws.onmessage=(event)=>{
  const now=Date.now();
  if(now-msgCooldown<200)return;
  msgCooldown=now;
  const data=JSON.parse(event.data);
  if(data.reply!==undefined){
    setThinking(false);
    uiState='responding'; stateTime=0;
    robot.baseY-=10; setTimeout(()=>robot.baseY+=10,350);
    addMessage('rexy',data.reply);
    if(data.emotion)setMood(data.emotion);
    if(data.intent&&data.intent!=='CHAT'&&data.intent!=='GREET')showPlugin(data.intent);
  }
};

async function handleChat(){
  const text=msgInput.value.trim();
  if(!text)return;
  addMessage('user',text);
  setThinking(true);
  uiState='listening'; stateTime=0;
  ws.send(JSON.stringify({message:text}));
  msgInput.value='';
}

function inspireMe(){
  addMessage('rexy','✨ Inspiration mode — coming soon!');
  setMood('happy');
}

msgInput.addEventListener('keypress',e=>{if(e.key==='Enter')handleChat();});
msgInput.addEventListener('focus',()=>{
  uiState='listening'; stateTransition=0;
  robot.eyes.left.targetX=5; robot.eyes.right.targetX=25;
});
msgInput.addEventListener('blur',()=>{if(!isThinking)uiState='idle';});

// ── Shortcut: / to focus, Escape to blur ──
document.addEventListener('keydown',(e)=>{
  if(e.key==='/'&&document.activeElement!==msgInput){
    e.preventDefault();
    msgInput.focus();
    inputBar.classList.remove('flash');
    void inputBar.offsetWidth;
    inputBar.classList.add('flash');
    setTimeout(()=>inputBar.classList.remove('flash'),500);
  }
  if(e.key==='Escape'&&document.activeElement===msgInput)msgInput.blur();
});

// ── Start ──
setMood('neutral');
drawRobot();
</script>
</body>
